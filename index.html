<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Basis Scan — 3D сборочный сканер мебели</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'SF Pro Text', sans-serif;
      background: #121212;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* 3D canvas на весь экран */
    #canvas3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    /* ========== НИЖНИЙ ТУЛБАР (НОВАЯ СИСТЕМА) ========== */
    .bottom-toolbar {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(24, 24, 36, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 8px 16px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 25;
      border: 0.5px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .toolbar-btn {
      background: transparent;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      font-size: 22px;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: none;
    }

    .toolbar-btn:active {
      transform: scale(0.92);
      background: rgba(0, 212, 255, 0.15);
      color: #00d4ff;
    }

    .toolbar-btn.active {
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.12);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 1px 1px rgba(255,255,255,0.05);
    }

    /* ========== КОМПАКТНАЯ BOTTOM SHEET (над тулбаром) ========== */
    .info-sheet {
      position: fixed;
      bottom: 88px;
      left: 16px;
      right: 16px;
      background: rgba(18, 18, 24, 0.96);
      backdrop-filter: blur(28px);
      border-radius: 28px;
      transform: translateY(120%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      z-index: 20;
      border: 0.5px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      pointer-events: auto;
      max-height: 30vh;
      display: flex;
      flex-direction: column;
    }

    .info-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 4px;
      margin: 12px auto 8px;
    }

    .info-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 20px 4px 20px;
    }

    .info-title {
      font-size: 12px;
      font-weight: 500;
      color: #00d4ff;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .info-close {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 0 6px;
      opacity: 0.7;
    }

    .info-content {
      padding: 6px 20px 20px 20px;
      overflow-y: auto;
      flex: 1;
    }

    /* Стили карточки детали — строгая структура */
    .detail-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .part-position {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .part-code {
      font-size: 11px;
      color: #00d4ff;
      font-family: monospace;
    }

    .part-name {
      font-size: 14px;
      font-weight: 500;
      color: #ddd;
      margin-bottom: 6px;
    }

    .dimensions-row {
      display: flex;
      gap: 16px;
      margin: 6px 0;
    }

    .dim {
      background: rgba(255,255,255,0.06);
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 12px;
    }

    .dim strong {
      font-weight: 500;
      color: #aaa;
    }

    .dim span {
      color: #00d4ff;
      font-weight: 500;
      margin-left: 6px;
    }

    .material-badge {
      font-size: 10px;
      color: #ff9f6e;
      background: rgba(255, 140, 90, 0.12);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      width: fit-content;
    }

    .status-badge {
      font-size: 11px;
      margin: 6px 0 4px;
    }
    .status-scanned { color: #2effb0; }
    .status-wait { color: #ffc107; }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .chip-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      padding: 8px 0;
      border-radius: 36px;
      font-size: 12px;
      color: #ccc;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
    }
    .chip-btn:active { background: rgba(0,212,255,0.2); color: #00d4ff; }

    /* Шторка списка деталей */
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 360px;
      background: rgba(18, 18, 24, 0.98);
      backdrop-filter: blur(28px);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 30;
      display: flex;
      flex-direction: column;
      border-right: 0.5px solid rgba(0,212,255,0.2);
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      padding: 24px 20px 16px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    .drawer-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #aaa;
      cursor: pointer;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .upload-btn {
      width: 100%;
      background: rgba(0,212,255,0.12);
      border: 0.5px solid rgba(0,212,255,0.4);
      padding: 14px;
      border-radius: 40px;
      color: #00d4ff;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      font-weight: 500;
    }

    .part-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.05s linear;
    }

    .part-item.active {
      background: rgba(0,212,255,0.12);
      border-left: 3px solid #00d4ff;
    }

    .part-swatch {
      width: 40px;
      height: 40px;
      border-radius: 16px;
    }

    .part-info { flex: 1; }
    .part-name { font-size: 14px; font-weight: 500; }
    .part-code { font-size: 11px; color: #00d4ff; margin-top: 2px; }
    .check { font-size: 20px; }
    .check.done { color: #2effb0; }

    /* Модалка QR */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal.hidden { display: none; }
    .modal-box {
      background: #1a1a24;
      border-radius: 40px;
      padding: 24px;
      width: 90%;
      max-width: 340px;
    }
    #video {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 24px;
      border: 2px solid #00d4ff;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      background: #252532;
      border: none;
      border-radius: 32px;
      color: white;
    }
  </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- НИЖНИЙ ТУЛБАР (ГЛАВНЫЙ) -->
<div class="bottom-toolbar">
  <button class="toolbar-btn" id="menuBtn">☰</button>
  <button class="toolbar-btn" id="scanBtn">📷</button>
  <button class="toolbar-btn" id="xrayBtn">🔮</button>
  <button class="toolbar-btn" id="rotateBtn">⟳</button>
  <button class="toolbar-btn" id="resetViewBtn">⌂</button>
</div>

<!-- BOTTOM SHEET (ИНФОРМАЦИЯ О ДЕТАЛИ) -->
<div id="infoSheet" class="info-sheet">
  <div class="sheet-handle"></div>
  <div class="info-header">
    <span class="info-title">Информация о детали</span>
    <button class="info-close" id="closeInfoBtn">✕</button>
  </div>
  <div id="infoContent" class="info-content">
    <div style="text-align:center;color:#666;padding:12px">👆 Нажмите на деталь в 3D</div>
  </div>
</div>

<!-- ШТОРКА (СПИСОК ДЕТАЛЕЙ) -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span style="font-weight:600;">📋 Спецификация</span>
    <button class="drawer-close" id="closeDrawerBtn">✕</button>
  </div>
  <div class="drawer-content">
    <div class="upload-btn" id="uploadBtn">📂 Загрузить JSON (Базис)</div>
    <div id="partsListContainer"></div>
  </div>
  <input type="file" id="fileInput" accept=".json" hidden>
</div>

<!-- QR СКАНЕР МОДАЛ -->
<div id="scannerModal" class="modal hidden">
  <div class="modal-box">
    <div style="color:#00d4ff; text-align:center; margin-bottom:12px;">📷 Сканирование QR</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="qrCanvas" hidden></canvas>
    <input type="text" id="manualCode" placeholder="Ввести артикул вручную" class="input-field">
    <button id="manualSubmit" style="width:100%;padding:12px;background:#00d4ff;border:none;border-radius:32px;font-weight:bold;">Найти</button>
    <button id="closeScannerBtn" style="width:100%;margin-top:8px;background:#2c2c3a;border:none;border-radius:32px;padding:12px;color:white;">Закрыть</button>
  </div>
</div>

<script>
  // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
  let parts = [];
  let selectedId = null;
  let scannedSet = new Set();
  let hiddenSet = new Set();
  let meshMap = new Map();
  let xrayActive = false;

  let scene, camera, renderer;
  let theta = 0.8, phi = 0.9, camDist = 3.5;
  let target = new THREE.Vector3(0, 0.5, 0);
  let isDragging = false, prevMouse = { x: 0, y: 0 };
  let autoRotate = false;

  // Плавный зум
  let isSmoothZoom = false;
  let zoomTargetPos = new THREE.Vector3();
  let zoomStartPos = new THREE.Vector3();
  let zoomStartTarget = new THREE.Vector3();
  let zoomProgress = 0;

  // ==================== THREE.JS ИНИЦИАЛИЗАЦИЯ ====================
  const canvas = document.getElementById('canvas3d');
  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);
    scene.fog = new THREE.FogExp2(0x121212, 0.015);

    camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(3, 2.5, 3);

    // Освещение премиум
    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
    mainLight.position.set(5, 8, 4);
    scene.add(mainLight);
    const backLight = new THREE.DirectionalLight(0x88aaff, 0.45);
    backLight.position.set(-3, 2, -4);
    scene.add(backLight);
    const fillLight = new THREE.PointLight(0x4466aa, 0.25);
    fillLight.position.set(1, 1.5, 2);
    scene.add(fillLight);
    
    const grid = new THREE.GridHelper(6, 18, 0x3a4a6a, 0x2a3a5a);
    grid.position.y = -0.02;
    scene.add(grid);
    
    setupControls();
    animate();
  }

  // ==================== УПРАВЛЕНИЕ (ТАЧИ + МЫШЬ) ====================
  let touchStartPos = null;
  let isPinching = false;
  let pinchStartDist = 0, pinchStartCamDist = 0;

  function setupControls() {
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd);
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('wheel', onWheel);
  }

  function onTouchStart(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1) {
      touchStartPos = { x: touches[0].clientX, y: touches[0].clientY };
      isDragging = true;
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      autoRotate = false;
    } else if (touches.length === 2) {
      isPinching = true;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartCamDist = camDist;
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1 && isDragging) {
      const deltaX = touches[0].clientX - prevMouse.x;
      const deltaY = touches[0].clientY - prevMouse.y;
      theta -= deltaX * 0.007;
      phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - deltaY * 0.007));
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      updateCameraTransform();
    } else if (touches.length === 2 && isPinching) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      camDist = Math.max(0.6, Math.min(12, pinchStartCamDist + (pinchStartDist - dist) * 0.012));
      updateCameraTransform();
    }
  }

  function onTouchEnd(e) {
    // Определяем тап (если палец не двигался)
    if (touchStartPos && !isDragging && !isPinching) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.changedTouches[0];
      const deltaX = Math.abs(touch.clientX - touchStartPos.x);
      const deltaY = Math.abs(touch.clientY - touchStartPos.y);
      if (deltaX < 8 && deltaY < 8) {
        handleTap(touch.clientX, touch.clientY, rect);
      }
    }
    isDragging = false;
    isPinching = false;
    touchStartPos = null;
  }

  function onMouseDown(e) {
    if (e.button === 0) { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; autoRotate = false; }
  }
  function onMouseMove(e) {
    if (!isDragging) return;
    theta -= (e.clientX - prevMouse.x) * 0.005;
    phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (e.clientY - prevMouse.y) * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCameraTransform();
  }
  function onMouseUp() { isDragging = false; }
  function onWheel(e) { camDist = Math.max(0.6, Math.min(12, camDist + camDist * e.deltaY * 0.001)); updateCameraTransform(); e.preventDefault(); }

  function updateCameraTransform() {
    if (isSmoothZoom) return;
    const x = target.x + camDist * Math.sin(phi) * Math.sin(theta);
    const y = target.y + camDist * Math.cos(phi);
    const z = target.z + camDist * Math.sin(phi) * Math.cos(theta);
    camera.position.set(x, y, z);
    camera.lookAt(target);
  }

  // Raycaster с нормализацией координат
  function handleTap(clientX, clientY, rect) {
    const mouse = new THREE.Vector2();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const visibleMeshes = Array.from(meshMap.values()).filter(m => m.visible === true);
    const hits = raycaster.intersectObjects(visibleMeshes);
    if (hits.length) {
      const partId = hits[0].object.userData.partId;
      if (!hiddenSet.has(partId)) selectPart(partId);
    }
  }

  // =============== ПЛАВНЫЙ ПОЛЕТ КАМЕРЫ (LERP) ===============
  function startSmoothZoom(partId) {
    const part = parts.find(p => p.id === partId);
    if (!part || !part._pos) return;
    zoomTargetPos.copy(new THREE.Vector3(part._pos.x, part._pos.y, part._pos.z));
    zoomStartPos.copy(camera.position);
    zoomStartTarget.copy(target);
    isSmoothZoom = true;
    zoomProgress = 0;
    autoRotate = false;
  }

  function updateSmoothZoom() {
    if (!isSmoothZoom) return;
    zoomProgress += 0.09;
    if (zoomProgress >= 1) {
      isSmoothZoom = false;
      target.copy(zoomTargetPos);
      camDist = 0.7;
      updateCameraTransform();
      return;
    }
    const ease = 1 - Math.pow(1 - zoomProgress, 2);
    camera.position.lerpVectors(zoomStartPos, zoomTargetPos, ease);
    target.lerpVectors(zoomStartTarget, zoomTargetPos, ease);
    camera.lookAt(target);
  }

  // ==================== ЗАГРУЗКА / ПОСТРОЕНИЕ СЦЕНЫ ====================
  function autoLayout(partsArr) {
    let minY = Infinity;
    partsArr.forEach(p => { if (p.pos && p.pos.y !== undefined) minY = Math.min(minY, p.pos.y); });
    if (minY === Infinity) minY = 0;
    const sc = 0.001;
    partsArr.forEach(p => {
      if (!p.pos || !p.gab) {
        const cols = Math.ceil(Math.sqrt(partsArr.length));
        const row = Math.floor(p.id / cols);
        const col = p.id % cols;
        p._pos = { x: (col - cols/2) * 0.16, y: 0, z: (row - cols/2) * 0.16 };
        p._size = { x: 0.09, y: 0.09, z: 0.09 };
        return;
      }
      p._pos = { x: (p.pos.x + p.gab.w/2) * sc, y: (p.pos.y - minY + p.gab.h/2) * sc, z: (p.pos.z + p.gab.d/2) * sc };
      p._size = { x: Math.max(p.gab.w,1)*sc, y: Math.max(p.gab.h,1)*sc, z: Math.max(p.gab.d,1)*sc };
    });
  }

  function getColor(mat) {
    const m = (mat || '').toLowerCase();
    if (m.includes('белый')) return '#e8e4db';
    if (m.includes('дуб сонома')) return '#cdb38c';
    if (m.includes('дуб')) return '#c2a070';
    if (m.includes('венге')) return '#4a3422';
    if (m.includes('графит')) return '#5a5e64';
    if (m.includes('хром')) return '#cbd2db';
    if (m.includes('кашемир')) return '#cfc4b6';
    return '#a89a88';
  }

  function buildScene() {
    meshMap.forEach(m => scene.remove(m));
    meshMap.clear();
    parts.forEach(p => {
      const geometry = new THREE.BoxGeometry(p._size.x, p._size.y, p._size.z);
      const material = new THREE.MeshStandardMaterial({
        color: getColor(p.material),
        roughness: 0.55,
        metalness: 0.12,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(p._pos.x, p._pos.y, p._pos.z);
      mesh.userData = { partId: p.id };
      scene.add(mesh);
      meshMap.set(p.id, mesh);
    });
    centerCamera();
    renderPartsList();
  }

  function centerCamera() {
    if (!parts.length) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
    parts.forEach(p => {
      if (!p._pos) return;
      minX = Math.min(minX, p._pos.x - p._size.x/2);
      maxX = Math.max(maxX, p._pos.x + p._size.x/2);
      minY = Math.min(minY, p._pos.y - p._size.y/2);
      maxY = Math.max(maxY, p._pos.y + p._size.y/2);
      minZ = Math.min(minZ, p._pos.z - p._size.z/2);
      maxZ = Math.max(maxZ, p._pos.z + p._size.z/2);
    });
    target.set((minX+maxX)/2, (minY+maxY)/2, (minZ+maxZ)/2);
    const size = Math.max(maxX-minX, maxY-minY, maxZ-minZ);
    camDist = Math.max(size * 1.5, 2.2);
    updateCameraTransform();
  }

  // =============== ВЫБОР ДЕТАЛИ И ПОДСВЕТКА (EMISSIVE) ===============
  function selectPart(id) {
    selectedId = id;
    meshMap.forEach(mesh => {
      mesh.material.emissiveIntensity = 0;
      mesh.material.emissive.setHex(0x000000);
    });
    const selected = meshMap.get(id);
    if (selected) {
      selected.material.emissive.setHex(0x00aaff);
      selected.material.emissiveIntensity = 0.6;
    }
    if (xrayActive) applyXray();
    updateInfoPanel(parts.find(p => p.id === id));
    renderPartsList();
    openInfoSheet();
  }

  function updateInfoPanel(p) {
    const container = document.getElementById('infoContent');
    if (!p) {
      container.innerHTML = '<div style="text-align:center;color:#666;padding:16px">👆 Нажмите на деталь</div>';
      return;
    }
    const scanned = scannedSet.has(p.id);
    container.innerHTML = `
      <div class="detail-block">
        <div class="row-header">
          <span class="part-position">📌 Позиция: ${p.name}</span>
          <span class="part-code">${escapeHtml(p.code)}</span>
        </div>
        <div class="dimensions-row">
          <div class="dim"><strong>L</strong> <span>${p.L}</span></div>
          <div class="dim"><strong>W</strong> <span>${p.W}</span></div>
          <div class="dim"><strong>T</strong> <span>${p.T}</span></div>
        </div>
        <div class="material-badge">${escapeHtml(p.material)}</div>
        <div class="status-badge ${scanned ? 'status-scanned' : 'status-wait'}">${scanned ? '✅ Отсканировано' : '⏳ Ожидает сборки'}</div>
        <div class="action-row">
          <div class="chip-btn" id="hidePartBtn">🙈 Скрыть</div>
          <div class="chip-btn" id="showAllFromSheet">👁 Показать всё</div>
          <div class="chip-btn" id="zoomPartBtn">🔍 Приблизить</div>
        </div>
      </div>
    `;
    document.getElementById('hidePartBtn')?.addEventListener('click', (e) => { e.stopPropagation(); toggleVisibility(p.id); });
    document.getElementById('showAllFromSheet')?.addEventListener('click', (e) => { e.stopPropagation(); showAllParts(); });
    document.getElementById('zoomPartBtn')?.addEventListener('click', (e) => { e.stopPropagation(); startSmoothZoom(p.id); });
  }

  function toggleVisibility(id) {
    const mesh = meshMap.get(id);
    if (!mesh) return;
    if (hiddenSet.has(id)) {
      hiddenSet.delete(id);
      mesh.visible = true;
    } else {
      hiddenSet.add(id);
      mesh.visible = false;
      if (selectedId === id) {
        selectedId = null;
        updateInfoPanel(null);
        closeInfoSheet();
      }
    }
    renderPartsList();
    if (xrayActive) applyXray();
  }

  function showAllParts() {
    hiddenSet.clear();
    meshMap.forEach(mesh => { mesh.visible = true; });
    if (selectedId === null) updateInfoPanel(null);
    renderPartsList();
    if (xrayActive) applyXray();
    showToast('👁 Все детали показаны');
  }

  // =============== X-RAY РЕЖИМ ===============
  function toggleXray() {
    xrayActive = !xrayActive;
    document.getElementById('xrayBtn').classList.toggle('active', xrayActive);
    if (!xrayActive) {
      meshMap.forEach(m => { m.material.transparent = false; m.material.opacity = 1; });
    } else {
      applyXray();
    }
  }

  function applyXray() {
    meshMap.forEach((mesh, id) => {
      if (xrayActive && selectedId !== null && id !== selectedId && mesh.visible) {
        mesh.material.transparent = true;
        mesh.material.opacity = 0.18;
      } else {
        mesh.material.transparent = false;
        mesh.material.opacity = 1;
      }
    });
  }

  // =============== UI СПИСОК ===============
  function renderPartsList() {
    const container = document.getElementById('partsListContainer');
    if (!container) return;
    if (!parts.length) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:#666">📁 Загрузите JSON-файл из Базис</div>';
      return;
    }
    container.innerHTML = '';
    parts.forEach(p => {
      const isHidden = hiddenSet.has(p.id);
      const div = document.createElement('div');
      div.className = `part-item ${selectedId === p.id ? 'active' : ''}`;
      div.style.opacity = isHidden ? '0.5' : '1';
      div.innerHTML = `
        <div class="part-swatch" style="background:${getColor(p.material)}"></div>
        <div class="part-info">
          <div class="part-name">${escapeHtml(p.name)}</div>
          <div class="part-code">${escapeHtml(p.code)}</div>
        </div>
        <div class="check ${scannedSet.has(p.id) ? 'done' : ''}">${scannedSet.has(p.id) ? '✅' : '○'}</div>
      `;
      div.addEventListener('click', () => selectPart(p.id));
      container.appendChild(div);
    });
  }

  function showToast(msg) {
    let el = document.getElementById('toastMsg');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toastMsg';
      el.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#000c;backdrop-filter:blur(12px);padding:8px 20px;border-radius:40px;color:#0cf;font-size:13px;z-index:200;pointer-events:none';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 2000);
  }

  // =============== QR СКАНЕР ===============
  let scanInterval, videoStream;
  function openScanner() {
    document.getElementById('scannerModal').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        videoStream = stream;
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.play();
        startQRScan();
      }).catch(() => alert('Нет доступа к камере'));
  }
  function closeScanner() {
    document.getElementById('scannerModal').classList.add('hidden');
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    if (scanInterval) clearInterval(scanInterval);
  }
  function startQRScan() {
    const video = document.getElementById('video');
    const qrCanvas = document.getElementById('qrCanvas');
    const ctx = qrCanvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      qrCanvas.width = video.videoWidth;
      qrCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code) { handleScanCode(code.data); closeScanner(); }
    }, 200);
  }
  function handleManualCode() {
    const code = document.getElementById('manualCode').value.trim();
    if (code) handleScanCode(code);
    closeScanner();
  }
  function handleScanCode(code) {
    let found = parts.find(p => p.code === code || p.code.trim() === code.trim() || p.code.toLowerCase() === code.toLowerCase());
    if (!found) found = parts.find(p => code.includes(p.code) || p.code.includes(code));
    if (!found) { alert('❌ Деталь не найдена: ' + code); return; }
    scannedSet.add(found.id);
    selectPart(found.id);
    renderPartsList();
    startSmoothZoom(found.id);
    showToast(`✅ ${found.name} отсканирована`);
  }

  function openInfoSheet() { document.getElementById('infoSheet').classList.add('open'); }
  function closeInfoSheet() { document.getElementById('infoSheet').classList.remove('open'); }
  function openDrawer() { document.getElementById('drawer').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // ==================== ЗАГРУЗКА ФАЙЛА И СОБЫТИЯ ====================
  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        parts = data.parts || data;
        parts.forEach((p, idx) => { if (p.id === undefined) p.id = idx; });
        autoLayout(parts);
        buildScene();
        selectedId = null;
        scannedSet.clear();
        hiddenSet.clear();
        if (xrayActive) toggleXray();
        centerCamera();
        closeDrawer();
        showToast(`✅ Загружено ${parts.length} деталей`);
      } catch(err) { alert('Ошибка файла'); }
    };
    reader.readAsText(file, 'UTF-8');
  });

  document.getElementById('menuBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('closeInfoBtn').addEventListener('click', closeInfoSheet);
  document.getElementById('scanBtn').addEventListener('click', openScanner);
  document.getElementById('rotateBtn').addEventListener('click', () => { autoRotate = !autoRotate; });
  document.getElementById('resetViewBtn').addEventListener('click', () => { centerCamera(); autoRotate = false; isSmoothZoom = false; });
  document.getElementById('xrayBtn').addEventListener('click', () => toggleXray());
  document.getElementById('closeScannerBtn').addEventListener('click', closeScanner);
  document.getElementById('manualSubmit').addEventListener('click', handleManualCode);

  // АНИМАЦИОННЫЙ ЦИКЛ
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isDragging && !isSmoothZoom) {
      theta += 0.0025;
      updateCameraTransform();
    }
    if (isSmoothZoom) updateSmoothZoom();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  initThree();
</script>
</body>
</html>

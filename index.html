<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bazis Scan — 3D сканер мебели</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Roboto, sans-serif;
      background: #121212;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 3D Canvas */
    #canvas3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    /* ========== МЕНЮ КНОПКА (СПРАВА ВВЕРХУ) ========== */
    .menu-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(24, 24, 32, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      width: 48px;
      height: 48px;
      border-radius: 16px;
      font-size: 22px;
      z-index: 20;
      color: #00d4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 8px 24px rgba(0,0,0,0.4);
      transition: all 0.15s ease;
    }

    .menu-btn:active {
      transform: scale(0.93);
      background: rgba(0, 212, 255, 0.15);
      box-shadow: inset 0 2px 4px rgba(0,212,255,0.3), 0 4px 12px rgba(0,212,255,0.2);
    }

    /* ========== НИЖНИЙ ТУЛБАР ========== */
    .bottom-toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(18, 18, 24, 0.92);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0, 212, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 12px 16px 12px;
      z-index: 19;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.5);
    }

    .toolbar-btn {
      background: rgba(24, 28, 40, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.15);
      width: 56px;
      height: 56px;
      border-radius: 16px;
      font-size: 24px;
      cursor: pointer;
      color: #00d4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.03), 0 4px 12px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .toolbar-btn:active {
      transform: scale(0.9);
      background: rgba(0, 212, 255, 0.2);
      box-shadow: inset 0 2px 4px rgba(0,212,255,0.2), 0 2px 8px rgba(0,212,255,0.15);
    }

    .toolbar-btn.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: #00d4ff;
      box-shadow: inset 0 1px 3px rgba(0,212,255,0.3), 0 4px 12px rgba(0,212,255,0.2);
    }

    /* ========== BOTTOM SHEET (ИНФО-ПАНЕЛЬ) ========== */
    .bottom-sheet {
      position: fixed;
      bottom: 70px;
      left: 0;
      right: 0;
      background: rgba(18, 18, 24, 0.95);
      backdrop-filter: blur(24px);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 18;
      border-top: 1px solid rgba(0, 212, 255, 0.2);
      border-left: 1px solid rgba(0, 212, 255, 0.1);
      border-right: 1px solid rgba(0, 212, 255, 0.1);
      max-height: 25vh;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.6);
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      margin: 12px auto 8px;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 8px;
    }

    .sheet-title {
      font-size: 11px;
      font-weight: 600;
      color: #00d4ff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sheet-close {
      background: none;
      border: none;
      color: #666;
      font-size: 20px;
      cursor: pointer;
      padding: 0 8px;
      transition: color 0.15s;
    }

    .sheet-close:active {
      color: #00d4ff;
    }

    .sheet-content {
      padding: 0 20px 16px;
      overflow-y: auto;
      max-height: calc(25vh - 50px);
    }

    /* Карточка детали */
    .detail-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .detail-label {
      font-size: 10px;
      color: #888;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .detail-value {
      font-size: 13px;
      color: #fff;
      font-weight: 500;
    }

    .detail-code {
      font-size: 11px;
      color: #00d4ff;
      font-family: 'Monaco', 'Menlo', monospace;
      letter-spacing: 0.3px;
    }

    .dims-row {
      display: flex;
      gap: 8px;
      margin: 4px 0;
    }

    .dim {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 10px;
      flex: 1;
      text-align: center;
    }

    .dim-label {
      color: #666;
      display: block;
      font-size: 8px;
      letter-spacing: 0.3px;
    }

    .dim-value {
      color: #00d4ff;
      font-weight: 600;
      font-size: 11px;
    }

    .material-tag {
      font-size: 9px;
      color: #ff9f6e;
      background: rgba(255, 140, 90, 0.12);
      padding: 3px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 140, 90, 0.2);
      display: inline-block;
      width: fit-content;
      letter-spacing: 0.3px;
    }

    .status-badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .status-badge.scanned {
      color: #2effb0;
      background: rgba(46, 255, 176, 0.12);
      border: 1px solid rgba(46, 255, 176, 0.2);
    }

    .status-badge.waiting {
      color: #ffc107;
      background: rgba(255, 193, 7, 0.12);
      border: 1px solid rgba(255, 193, 7, 0.2);
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .action-btn {
      flex: 1;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      padding: 8px 0;
      border-radius: 10px;
      font-size: 11px;
      color: #00d4ff;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .action-btn:active {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00d4ff;
      box-shadow: inset 0 1px 2px rgba(0,212,255,0.3);
    }

    /* ========== DRAWER (МЕНЮ ДЕТАЛЕЙ) ========== */
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 320px;
      background: rgba(18, 18, 24, 0.98);
      backdrop-filter: blur(28px);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 25;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(0, 212, 255, 0.15);
      box-shadow: 4px 0 24px rgba(0,0,0,0.6);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 18px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    }

    .drawer-title {
      font-size: 12px;
      font-weight: 600;
      color: #00d4ff;
      letter-spacing: 1px;
    }

    .drawer-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #666;
      cursor: pointer;
      transition: color 0.15s;
    }

    .drawer-close:active {
      color: #00d4ff;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .upload-btn {
      width: 100%;
      background: rgba(0, 212, 255, 0.08);
      border: 1px dashed rgba(0, 212, 255, 0.3);
      padding: 14px;
      border-radius: 12px;
      color: #00d4ff;
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .upload-btn:active {
      background: rgba(0, 212, 255, 0.15);
      border-color: #00d4ff;
    }

    .part-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(0, 212, 255, 0.04);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid rgba(0, 212, 255, 0.1);
    }

    .part-item:active {
      background: rgba(0, 212, 255, 0.12);
    }

    .part-item.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: #00d4ff;
      box-shadow: inset 0 1px 3px rgba(0,212,255,0.2);
    }

    .part-swatch {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .part-info {
      flex: 1;
      min-width: 0;
    }

    .part-name {
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .part-code {
      font-size: 10px;
      color: #00d4ff;
      margin-top: 2px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .check {
      font-size: 16px;
      flex-shrink: 0;
    }

    .check.done {
      color: #2effb0;
    }

    /* ========== MODAL (QR СКАНЕР) ========== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(8px);
    }

    .modal.hidden {
      display: none;
    }

    .modal-box {
      background: rgba(24, 24, 32, 0.95);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
    }

    .modal-title {
      color: #00d4ff;
      text-align: center;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #video {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      margin-bottom: 16px;
    }

    .input-field {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .input-field::placeholder {
      color: #666;
    }

    .modal-btn {
      width: 100%;
      padding: 12px;
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      color: #00d4ff;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .modal-btn:active {
      background: rgba(0, 212, 255, 0.25);
      box-shadow: inset 0 1px 2px rgba(0,212,255,0.3);
    }

    .modal-btn.secondary {
      background: rgba(100, 100, 120, 0.2);
      border-color: rgba(100, 100, 120, 0.3);
      color: #aaa;
    }

    .modal-btn.secondary:active {
      background: rgba(100, 100, 120, 0.3);
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(18, 18, 24, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      padding: 10px 20px;
      border-radius: 12px;
      color: #00d4ff;
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-weight: 500;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.3);
    }
  </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- МЕНЮ КНОПКА -->
<div class="menu-btn" id="menuBtn">☰</div>

<!-- BOTTOM SHEET (ИНФО-ПАНЕЛЬ) -->
<div id="bottomSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">ДЕТАЛЬ</span>
    <button class="sheet-close" id="closeSheetBtn">✕</button>
  </div>
  <div id="sheetContent" class="sheet-content">
    <div style="text-align:center;color:#666;padding:12px;font-size:12px;">👆 Нажмите на деталь</div>
  </div>
</div>

<!-- НИЖНИЙ ТУЛБАР -->
<div class="bottom-toolbar">
  <button class="toolbar-btn" id="menuToolBtn" title="Меню">☰</button>
  <button class="toolbar-btn" id="scanBtn" title="Сканировать">📷</button>
  <button class="toolbar-btn" id="xrayBtn" title="X-Ray">👁</button>
  <button class="toolbar-btn" id="rotateBtn" title="Вращение">⟳</button>
  <button class="toolbar-btn" id="resetViewBtn" title="Центр">⌂</button>
</div>

<!-- DRAWER (МЕНЮ ДЕТАЛЕЙ) -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span class="drawer-title">📋 СПЕЦИФИКАЦИЯ</span>
    <button class="drawer-close" id="closeDrawerBtn">✕</button>
  </div>
  <div class="drawer-content">
    <div class="upload-btn" id="uploadBtn">📂 ЗАГРУЗИТЬ JSON</div>
    <div id="partsList"></div>
  </div>
  <input type="file" id="fileInput" accept=".json" hidden>
</div>

<!-- QR СКАНЕР -->
<div id="scannerModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">📷 НАВЕДИТЕ НА QR</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="qrCanvas" hidden></canvas>
    <input type="text" id="manualCode" placeholder="Или введите артикул" class="input-field">
    <button id="manualSubmit" class="modal-btn">✓ Проверить</button>
    <button id="closeScannerBtn" class="modal-btn secondary">Закрыть</button>
  </div>
</div>

<script>
  // ========== ПЕРЕМЕННЫЕ ==========
  let parts = [];
  let selectedId = null;
  let scannedSet = new Set();
  let hiddenSet = new Set();
  let meshMap = new Map();
  let xrayActive = false;

  let scene, camera, renderer;
  let theta = 0.8, phi = 0.9, camDist = 3.5;
  let targetPosition = new THREE.Vector3(0, 0.5, 0);
  let targetCamDist = 3.5;
  let isDragging = false, prevMouse = { x: 0, y: 0 };
  let autoRotate = false;
  let isSmoothZoom = false;
  let zoomTarget = new THREE.Vector3();

  // Touch tracking для точного раycaster
  let touchStartPos = null;
  let isPinching = false;
  let pinchStartDist = 0, pinchStartCamDist = 0;

  // ========== THREE.JS ИНИЦИАЛИЗАЦИЯ ==========
  const canvas = document.getElementById('canvas3d');

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);
    scene.fog = new THREE.FogExp2(0x121212, 0.022);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(3, 2.5, 3);

    // Освещение
    const ambient = new THREE.AmbientLight(0x404060, 0.7);
    scene.add(ambient);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.95);
    mainLight.position.set(5, 10, 5);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.35);
    fillLight.position.set(-3, 2, -4);
    scene.add(fillLight);

    // Grid
    const grid = new THREE.GridHelper(6, 20, 0x2a4a6a, 0x1a2a3a);
    grid.position.y = -0.02;
    scene.add(grid);

    setupControls();
    animate();
  }

  function setupControls() {
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd, { passive: false });
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('wheel', onWheel, { passive: false });
  }

  function onTouchStart(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1) {
      touchStartPos = { x: touches[0].clientX, y: touches[0].clientY };
      isDragging = true;
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      autoRotate = false;
    } else if (touches.length === 2) {
      isPinching = true;
      isDragging = false;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartCamDist = camDist;
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1 && isDragging) {
      theta -= (touches[0].clientX - prevMouse.x) * 0.008;
      phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (touches[0].clientY - prevMouse.y) * 0.008));
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      updateCamera();
    } else if (touches.length === 2 && isPinching) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      camDist = Math.max(0.5, Math.min(12, pinchStartCamDist + (pinchStartDist - dist) * 0.015));
      updateCamera();
    }
  }

  function onTouchEnd(e) {
    if (touchStartPos && !isPinching) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.changedTouches[0];
      const deltaX = Math.abs(touch.clientX - touchStartPos.x);
      const deltaY = Math.abs(touch.clientY - touchStartPos.y);
      if (deltaX < 5 && deltaY < 5) {
        handleRaycast(touch.clientX, touch.clientY, rect);
      }
    }
    isDragging = false;
    isPinching = false;
    touchStartPos = null;
  }

  function onMouseDown(e) {
    if (e.button === 0) {
      isDragging = true;
      prevMouse = { x: e.clientX, y: e.clientY };
      autoRotate = false;
    }
  }

  function onMouseMove(e) {
    if (!isDragging) return;
    theta -= (e.clientX - prevMouse.x) * 0.005;
    phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (e.clientY - prevMouse.y) * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  }

  function onMouseUp() {
    isDragging = false;
  }

  function onWheel(e) {
    e.preventDefault();
    camDist = Math.max(0.5, Math.min(12, camDist + camDist * e.deltaY * 0.001));
    updateCamera();
  }

  function updateCamera() {
    if (isSmoothZoom) return;
    camera.position.x = targetPosition.x + camDist * Math.sin(phi) * Math.sin(theta);
    camera.position.y = targetPosition.y + camDist * Math.cos(phi);
    camera.position.z = targetPosition.z + camDist * Math.sin(phi) * Math.cos(theta);
    camera.lookAt(targetPosition);
  }

  function startSmoothZoom(partId) {
    const part = parts.find(p => p.id === partId);
    if (!part || !part._pos) return;
    zoomTarget.set(part._pos.x, part._pos.y, part._pos.z);
    isSmoothZoom = true;
    autoRotate = false;
  }

  function animateSmoothZoom() {
    if (!isSmoothZoom) return;
    const lerpSpeed = 0.12;
    camera.position.lerp(zoomTarget, lerpSpeed);
    targetPosition.lerp(zoomTarget, lerpSpeed);
    camera.lookAt(targetPosition);
    if (camera.position.distanceTo(zoomTarget) < 0.08) {
      isSmoothZoom = false;
      camDist = camera.position.distanceTo(targetPosition);
    }
  }

  function handleRaycast(clientX, clientY, rect) {
    const mouse = new THREE.Vector2();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const visibleMeshes = Array.from(meshMap.values()).filter(m => m.visible === true);
    const hits = raycaster.intersectObjects(visibleMeshes);

    if (hits.length > 0) {
      const hitId = hits[0].object.userData.partId;
      if (!hiddenSet.has(hitId)) {
        selectPart(hitId);
      }
    }
  }

  // ========== ЗАГРУЗКА И ПОСТРОЕНИЕ ==========
  function autoLayout(partsArr) {
    let minY = Infinity;
    partsArr.forEach(p => { if (p.pos && p.pos.y !== undefined) minY = Math.min(minY, p.pos.y); });
    if (minY === Infinity) minY = 0;
    const sc = 0.001;
    partsArr.forEach(p => {
      if (!p.pos || !p.gab) {
        const cols = Math.ceil(Math.sqrt(partsArr.length));
        const row = Math.floor(p.id / cols);
        const col = p.id % cols;
        p._pos = { x: (col - cols / 2) * 0.15, y: 0, z: (row - cols / 2) * 0.15 };
        p._size = { x: 0.1, y: 0.1, z: 0.1 };
        return;
      }
      p._pos = { x: (p.pos.x + p.gab.w / 2) * sc, y: (p.pos.y - minY + p.gab.h / 2) * sc, z: (p.pos.z + p.gab.d / 2) * sc };
      p._size = { x: Math.max(p.gab.w, 1) * sc, y: Math.max(p.gab.h, 1) * sc, z: Math.max(p.gab.d, 1) * sc };
    });
  }

  function getColor(mat) {
    const m = (mat || '').toLowerCase();
    if (m.includes('белый')) return '#ece7e0';
    if (m.includes('дуб сонома')) return '#c8aa76';
    if (m.includes('дуб')) return '#b89062';
    if (m.includes('венге')) return '#3b2a1c';
    if (m.includes('графит')) return '#4f5154';
    if (m.includes('хром')) return '#bfc7d0';
    if (m.includes('кашемир')) return '#c7bcac';
    return '#9c8e7c';
  }

  function buildScene() {
    meshMap.forEach(m => scene.remove(m));
    meshMap.clear();
    parts.forEach(p => {
      const geo = new THREE.BoxGeometry(p._size.x, p._size.y, p._size.z);
      const mat = new THREE.MeshStandardMaterial({
        color: getColor(p.material),
        roughness: 0.55,
        metalness: 0.1,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(p._pos.x, p._pos.y, p._pos.z);
      mesh.userData = { partId: p.id };
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      meshMap.set(p.id, mesh);
    });
    centerCamera();
    renderPartsList();
  }

  function centerCamera() {
    if (!parts.length) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
    parts.forEach(p => {
      if (!p._pos) return;
      minX = Math.min(minX, p._pos.x - p._size.x / 2);
      maxX = Math.max(maxX, p._pos.x + p._size.x / 2);
      minY = Math.min(minY, p._pos.y - p._size.y / 2);
      maxY = Math.max(maxY, p._pos.y + p._size.y / 2);
      minZ = Math.min(minZ, p._pos.z - p._size.z / 2);
      maxZ = Math.max(maxZ, p._pos.z + p._size.z / 2);
    });
    targetPosition.set((minX + maxX) / 2, (minY + maxY) / 2, (minZ + maxZ) / 2);
    const size = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
    camDist = Math.max(size * 1.5, 2);
    updateCamera();
  }

  // ========== ВЫБОР И ПОДСВЕТКА ==========
  function selectPart(id) {
    selectedId = id;
    meshMap.forEach(mesh => {
      mesh.material.emissive.setHex(0x000000);
      mesh.material.emissiveIntensity = 0;
    });
    const selected = meshMap.get(id);
    if (selected) {
      selected.material.emissive.setHex(0x00d4ff);
      selected.material.emissiveIntensity = 0.5;
    }
    if (xrayActive) applyXray();
    updateSheet(parts.find(p => p.id === id));
    renderPartsList();
    openSheet();
  }

  function updateSheet(p) {
    const container = document.getElementById('sheetContent');
    if (!p) {
      container.innerHTML = '<div style="text-align:center;color:#666;padding:12px;font-size:12px;">👆 Нажмите на деталь</div>';
      return;
    }
    const isScanned = scannedSet.has(p.id);
    const dimStr = `${p.L || '—'} × ${p.W || '—'} × ${p.T || '—'}`;
    container.innerHTML = `
      <div class="detail-card">
        <div class="detail-row">
          <span class="detail-label">Позиция:</span>
          <span class="detail-value">${escapeHtml(p.name || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Артикул:</span>
          <span class="detail-code">${escapeHtml(p.code || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Размеры (L×W×T):</span>
          <span class="detail-value" style="font-family: monospace;">${dimStr}</span>
        </div>
        <div class="detail-row" style="margin-top: 6px;">
          <span class="material-tag">${escapeHtml(p.material || 'Материал')}</span>
          <span class="status-badge ${isScanned ? 'scanned' : 'waiting'}">${isScanned ? '✅ ОТСКАНИРОВАНО' : '⏳ ОЖИДАЕТ'}</span>
        </div>
        <div class="action-buttons">
          <button class="action-btn" id="hideBtn">🙈 Скрыть</button>
          <button class="action-btn" id="showAllBtn">👁 Показать</button>
          <button class="action-btn" id="zoomBtn">🔍 Приблизить</button>
        </div>
      </div>
    `;
    document.getElementById('hideBtn')?.addEventListener('click', (e) => { e.stopPropagation(); toggleVisibility(p.id); });
    document.getElementById('showAllBtn')?.addEventListener('click', (e) => { e.stopPropagation(); showAllParts(); });
    document.getElementById('zoomBtn')?.addEventListener('click', (e) => { e.stopPropagation(); startSmoothZoom(p.id); });
  }

  function toggleVisibility(id) {
    const mesh = meshMap.get(id);
    if (!mesh) return;
    if (hiddenSet.has(id)) {
      hiddenSet.delete(id);
      mesh.visible = true;
    } else {
      hiddenSet.add(id);
      mesh.visible = false;
      if (selectedId === id) {
        selectedId = null;
        updateSheet(null);
        closeSheet();
      }
    }
    renderPartsList();
    if (xrayActive) applyXray();
    showToast(`${hiddenSet.has(id) ? '🙈' : '👁'} Деталь ${hiddenSet.has(id) ? 'скрыта' : 'показана'}`);
  }

  function showAllParts() {
    hiddenSet.clear();
    meshMap.forEach(mesh => { mesh.visible = true; });
    renderPartsList();
    if (xrayActive) applyXray();
    showToast('👁 Все детали показаны');
  }

  function applyXray() {
    meshMap.forEach((mesh, id) => {
      if (xrayActive && selectedId !== null && id !== selectedId && mesh.visible) {
        mesh.material.transparent = true;
        mesh.material.opacity = 0.15;
      } else {
        mesh.material.transparent = false;
        mesh.material.opacity = 1;
      }
    });
  }

  function toggleXray() {
    xrayActive = !xrayActive;
    document.getElementById('xrayBtn').classList.toggle('active', xrayActive);
    if (!xrayActive) {
      meshMap.forEach(m => { m.material.transparent = false; m.material.opacity = 1; });
    } else {
      applyXray();
    }
  }

  // ========== UI ==========
  function renderPartsList() {
    const container = document.getElementById('partsList');
    if (!container) return;
    if (parts.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:#666;font-size:12px;">📁 Загрузите JSON</div>';
      return;
    }
    container.innerHTML = '';
    parts.forEach(p => {
      const isHidden = hiddenSet.has(p.id);
      const div = document.createElement('div');
      div.className = `part-item ${selectedId === p.id ? 'active' : ''}`;
      div.style.opacity = isHidden ? '0.5' : '1';
      div.innerHTML = `
        <div class="part-swatch" style="background:${getColor(p.material)}"></div>
        <div class="part-info">
          <div class="part-name">${escapeHtml(p.name || '—')}</div>
          <div class="part-code">${escapeHtml(p.code || '—')}</div>
        </div>
        <div class="check ${scannedSet.has(p.id) ? 'done' : ''}">${scannedSet.has(p.id) ? '✅' : '○'}</div>
      `;
      div.addEventListener('click', () => selectPart(p.id));
      container.appendChild(div);
    });
  }

  function showToast(msg) {
    let toast = document.getElementById('customToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'customToast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ========== QR СКАНЕР ==========
  let scanInterval, videoStream;

  function openScanner() {
    document.getElementById('scannerModal').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        videoStream = stream;
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.play();
        startQRScan();
      })
      .catch(() => showToast('❌ Нет доступа к камере'));
  }

  function closeScanner() {
    document.getElementById('scannerModal').classList.add('hidden');
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    if (scanInterval) clearInterval(scanInterval);
  }

  function startQRScan() {
    const video = document.getElementById('video');
    const qrCanvas = document.getElementById('qrCanvas');
    const ctx = qrCanvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      qrCanvas.width = video.videoWidth;
      qrCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code) {
        handleScan(code.data);
        closeScanner();
      }
    }, 200);
  }

  function handleManualCode() {
    const code = document.getElementById('manualCode').value.trim();
    if (code) {
      handleScan(code);
      closeScanner();
    }
  }

  function handleScan(code) {
    let found = parts.find(p => p.code === code || p.code?.trim() === code.trim() || p.code?.toLowerCase() === code.toLowerCase());
    if (!found) found = parts.find(p => code.includes(p.code) || p.code?.includes(code));
    if (!found) {
      showToast('❌ Деталь не найдена');
      return;
    }
    scannedSet.add(found.id);
    selectPart(found.id);
    renderPartsList();
    startSmoothZoom(found.id);
    showToast(`✅ ${found.name}`);
  }

  // ========== СОБЫТИЯ ==========
  function openDrawer() { document.getElementById('drawer').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
  function openSheet() { document.getElementById('bottomSheet').classList.add('open'); }
  function closeSheet() { document.getElementById('bottomSheet').classList.remove('open'); }
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        parts = data.parts || data;
        parts.forEach((p, idx) => { if (p.id === undefined) p.id = idx; });
        autoLayout(parts);
        buildScene();
        selectedId = null;
        scannedSet.clear();
        hiddenSet.clear();
        if (xrayActive) toggleXray();
        centerCamera();
        closeDrawer();
        showToast(`✅ Загружено ${parts.length} деталей`);
      } catch (err) {
        showToast('❌ Ошибка файла: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  });

  document.getElementById('menuBtn').addEventListener('click', openDrawer);
  document.getElementById('menuToolBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('closeSheetBtn').addEventListener('click', closeSheet);
  document.getElementById('scanBtn').addEventListener('click', openScanner);
  document.getElementById('rotateBtn').addEventListener('click', () => { autoRotate = !autoRotate; });
  document.getElementById('resetViewBtn').addEventListener('click', () => { centerCamera(); autoRotate = false; isSmoothZoom = false; });
  document.getElementById('xrayBtn').addEventListener('click', () => toggleXray());
  document.getElementById('closeScannerBtn').addEventListener('click', closeScanner);
  document.getElementById('manualSubmit').addEventListener('click', handleManualCode);

  // Анимация
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isDragging && !isSmoothZoom) {
      theta += 0.0025;
      updateCamera();
    }
    if (isSmoothZoom) animateSmoothZoom();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  initThree();
</script>
</body>

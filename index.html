<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Баzis Scan — 3D сканер мебели</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- МОДАЛКА ВХОДА -->
  <div id="loginModal" class="modal">
    <div class="modal-box" style="width:300px">
      <div class="modal-title">🔐 Вход в систему</div>
      <input type="email" id="loginEmail" placeholder="Email" class="input-field">
      <input type="password" id="loginPassword" placeholder="Пароль" class="input-field">
      <button onclick="handleLogin()" class="btn-primary" style="width:100%">Войти</button>
      <div class="demo-hint">Демо: demo@example.com / 123456</div>
    </div>
  </div>

  <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
  <div id="app" style="display:none">
    
    <!-- ПЛАВАЮЩАЯ ПАНЕЛЬ -->
    <div class="floating-panel">
      <button class="float-btn" id="menuBtn">☰</button>
      <button class="float-btn" id="scanFloatBtn">📷</button>
      <button class="float-btn" id="rotateBtn">⟳</button>
      <button class="float-btn" id="resetViewBtn">⌂</button>
      <button class="float-btn" id="logoutBtn">🚪</button>
    </div>

    <!-- ЛЕВАЯ ШТОРКА (список деталей) -->
    <div id="leftDrawer" class="drawer left-drawer">
      <div class="drawer-header">
        <span>📋 Детали проекта</span>
        <button class="close-drawer" onclick="closeLeftDrawer()">✕</button>
      </div>
      <div class="drawer-content">
        <button class="btn-upload-full" onclick="document.getElementById('xmlFile').click()">
          📂 Загрузить XML / JSON
        </button>
        <input type="file" id="xmlFile" accept=".xml,.json" hidden>
        <div id="partsList"></div>
      </div>
    </div>

    <!-- ПРАВАЯ ШТОРКА (информация) -->
    <div id="rightDrawer" class="drawer right-drawer">
      <div class="drawer-header">
        <span>🔍 Информация</span>
        <button class="close-drawer" onclick="closeRightDrawer()">✕</button>
      </div>
      <div class="drawer-content" id="partInfo">
        <div class="no-select">👆 Нажми на деталь</div>
      </div>
    </div>

    <!-- 3D КАНВАС -->
    <div class="canvas-container">
      <canvas id="canvas3d"></canvas>
      <div class="hint" id="hint">📂 Загрузите файл</div>
    </div>

    <!-- СКАНЕР QR -->
    <div id="scannerModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title">📷 Наведи на QR-код</div>
        <video id="video" autoplay playsinline></video>
        <canvas id="qrCanvas" hidden></canvas>
        <div id="scanStatus">Сканирование...</div>
        <input type="text" id="manualCode" placeholder="Или введите код" class="input-field">
        <button onclick="handleManualCode()" class="btn-primary">Проверить</button>
        <button onclick="closeScanner()" class="btn-secondary">Закрыть</button>
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>

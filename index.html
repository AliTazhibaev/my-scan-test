<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bazis Scan Pro — 3D сканер мебели</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --bg-primary: #1f1f2e;
      --bg-secondary: #181824;
      --bg-tertiary: #282834;
      --text-primary: #fff;
      --text-secondary: #aaa;
      --border: rgba(0, 212, 255, 0.15);
      --accent: #00d4ff;
      --canvas-bg: #1f1f2e;
    }

    body.light-theme {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f0f0f2;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --border: rgba(0, 100, 200, 0.2);
      --accent: #0066cc;
      --canvas-bg: #e8eaef;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Roboto, sans-serif;
      background: var(--bg-primary);
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    #canvas3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    /* ========== ВЕРХНЯЯ ПАНЕЛЬ ========== */
    .top-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 20;
      backdrop-filter: blur(16px);
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .theme-toggle:active {
      transform: scale(0.9);
      background: var(--accent);
      color: var(--bg-secondary);
    }

    .project-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 12px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-value {
      font-weight: 600;
      color: var(--accent);
      font-size: 13px;
    }

    .progress-container {
      flex: 1;
      max-width: 300px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(0, 212, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
    }

    .top-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .top-btn:active {
      transform: scale(0.9);
      background: var(--accent);
      color: var(--bg-secondary);
    }

    /* ========== НИЖНИЙ ТУЛБАР ========== */
    .bottom-toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 12px 16px 12px;
      z-index: 19;
      backdrop-filter: blur(20px);
    }

    .toolbar-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      width: 56px;
      height: 56px;
      border-radius: 16px;
      font-size: 24px;
      cursor: pointer;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .toolbar-btn:active {
      transform: scale(0.9);
      background: var(--accent);
      color: var(--bg-secondary);
    }

    .toolbar-btn.active {
      background: rgba(0, 212, 255, 0.2);
      border-color: var(--accent);
    }

    /* ========== BOTTOM SHEET ========== */
    .bottom-sheet {
      position: fixed;
      bottom: 70px;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 18;
      border-top: 1px solid var(--border);
      max-height: 25vh;
      backdrop-filter: blur(24px);
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--text-secondary);
      opacity: 0.3;
      border-radius: 4px;
      margin: 12px auto 8px;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 8px;
    }

    .sheet-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sheet-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 0 8px;
      transition: color 0.15s;
    }

    .sheet-close:active {
      color: var(--accent);
    }

    .sheet-content {
      padding: 0 20px 16px;
      overflow-y: auto;
      max-height: calc(25vh - 50px);
    }

    .detail-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .detail-label {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .detail-value {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .detail-code {
      font-size: 11px;
      color: var(--accent);
      font-family: 'Monaco', 'Menlo', monospace;
      letter-spacing: 0.3px;
    }

    .dims-row {
      display: flex;
      gap: 8px;
      margin: 4px 0;
    }

    .dim {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 10px;
      flex: 1;
      text-align: center;
    }

    .dim-label {
      color: var(--text-secondary);
      display: block;
      font-size: 8px;
      letter-spacing: 0.3px;
    }

    .dim-value {
      color: var(--accent);
      font-weight: 600;
      font-size: 11px;
    }

    .material-tag {
      font-size: 9px;
      color: #ff9f6e;
      background: rgba(255, 140, 90, 0.12);
      padding: 3px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 140, 90, 0.2);
      display: inline-block;
      width: fit-content;
      letter-spacing: 0.3px;
    }

    .status-badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .status-badge.scanned {
      color: #2effb0;
      background: rgba(46, 255, 176, 0.12);
      border: 1px solid rgba(46, 255, 176, 0.2);
    }

    .status-badge.waiting {
      color: #ffc107;
      background: rgba(255, 193, 7, 0.12);
      border: 1px solid rgba(255, 193, 7, 0.2);
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .action-btn {
      flex: 1;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid var(--border);
      padding: 8px 0;
      border-radius: 10px;
      font-size: 11px;
      color: var(--accent);
      text-align: center;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .action-btn:active {
      background: rgba(0, 212, 255, 0.2);
      border-color: var(--accent);
    }

    /* ========== DRAWER ========== */
    .drawer {
      position: fixed;
      top: 60px;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 320px;
      background: var(--bg-secondary);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 25;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      backdrop-filter: blur(28px);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .drawer-close {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.15s;
    }

    .drawer-close:active {
      color: var(--accent);
    }

    .drawer-search {
      padding: 12px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 12px;
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .upload-btn {
      width: 100%;
      background: rgba(0, 212, 255, 0.08);
      border: 1px dashed var(--border);
      padding: 12px;
      border-radius: 12px;
      color: var(--accent);
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .upload-btn:active {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--accent);
    }

    .part-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(0, 212, 255, 0.04);
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
    }

    .part-item:active {
      background: rgba(0, 212, 255, 0.12);
    }

    .part-item.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--accent);
    }

    .part-swatch {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .part-info {
      flex: 1;
      min-width: 0;
    }

    .part-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .part-code {
      font-size: 9px;
      color: var(--accent);
      margin-top: 1px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .check {
      font-size: 14px;
      flex-shrink: 0;
    }

    .check.done {
      color: #2effb0;
    }

    /* ========== MODAL ========== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      backdrop-filter: blur(8px);
    }

    .modal.hidden {
      display: none;
    }

    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 320px;
    }

    .modal-title {
      color: var(--accent);
      text-align: center;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #video {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid var(--border);
      margin-bottom: 16px;
    }

    .input-field {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .input-field::placeholder {
      color: var(--text-secondary);
    }

    .modal-btn {
      width: 100%;
      padding: 12px;
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .modal-btn:active {
      background: rgba(0, 212, 255, 0.25);
    }

    .modal-btn.secondary {
      background: rgba(100, 100, 120, 0.2);
      border-color: rgba(100, 100, 120, 0.3);
      color: var(--text-secondary);
    }

    .modal-btn.secondary:active {
      background: rgba(100, 100, 120, 0.3);
    }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 12px;
      color: var(--accent);
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .toast.show {
      opacity: 1;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.3);
    }
  </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- ВЕРХНЯЯ ПАНЕЛЬ -->
<div class="top-panel">
  <div class="top-left">
    <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>
    <span class="project-title" id="projectTitle">Bazis Scan Pro</span>
  </div>
  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <span>Собрано:</span>
      <span class="stat-value"><span id="scannedCount">0</span>/<span id="totalCount">0</span></span>
    </div>
  </div>
  <div class="top-buttons">
    <button class="top-btn" id="exportBtn" title="Экспорт JSON">📊</button>
    <button class="top-btn" id="printBtn" title="Печать">🖨️</button>
    <button class="top-btn" id="menuBtn" title="Меню">☰</button>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div id="bottomSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">ДЕТАЛЬ</span>
    <button class="sheet-close" id="closeSheetBtn">✕</button>
  </div>
  <div id="sheetContent" class="sheet-content">
    <div style="text-align:center;color:var(--text-secondary);padding:12px;font-size:12px;">👆 Нажмите на деталь</div>
  </div>
</div>

<!-- НИЖНИЙ ТУЛБАР -->
<div class="bottom-toolbar">
  <button class="toolbar-btn" id="scanBtn" title="Сканировать">📷</button>
  <button class="toolbar-btn" id="xrayBtn" title="X-Ray">👁</button>
  <button class="toolbar-btn" id="rotateBtn" title="Вращение">⟳</button>
  <button class="toolbar-btn" id="resetViewBtn" title="Центр">⌂</button>
  <button class="toolbar-btn" id="resetProgressBtn" title="Сбросить">🔄</button>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span class="drawer-title">📋 ДЕТАЛИ</span>
    <button class="drawer-close" id="closeDrawerBtn">✕</button>
  </div>
  <div class="drawer-search">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск...">
  </div>
  <div class="drawer-content">
    <div class="upload-btn" id="uploadBtn">📂 ЗАГРУЗИТЬ JSON</div>
    <div id="partsList"></div>
  </div>
  <input type="file" id="fileInput" accept=".json" hidden>
</div>

<!-- QR СКАНЕР -->
<div id="scannerModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">📷 НАВЕДИТЕ НА QR</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="qrCanvas" hidden></canvas>
    <input type="text" id="manualCode" placeholder="Или введите артикул" class="input-field">
    <button id="manualSubmit" class="modal-btn">✓ Проверить</button>
    <button id="closeScannerBtn" class="modal-btn secondary">Закрыть</button>
  </div>
</div>

<script>
  // ========== ПЕРЕМЕННЫЕ ==========
  let parts = [];
  let selectedId = null;
  let scannedSet = new Set();
  let hiddenSet = new Set();
  let meshMap = new Map();
  let edgeLineMap = new Map();
  let xrayActive = false;
  let isDarkTheme = true;

  let scene, camera, renderer;
  let theta = 0.8, phi = 0.9, camDist = 3.5;
  let targetPosition = new THREE.Vector3(0, 0.5, 0);
  let isDragging = false, prevMouse = { x: 0, y: 0 };
  let autoRotate = false;
  let isSmoothZoom = false;
  let zoomTarget = new THREE.Vector3();

  let touchStartPos = null;
  let isPinching = false;
  let pinchStartDist = 0, pinchStartCamDist = 0;
  let mouseStartPos = null;
  let mouseMovedDistance = 0;

  // ========== ИНИЦИАЛИЗАЦИЯ ТЕМЫ ==========
  function initTheme() {
    isDarkTheme = localStorage.getItem('bazisTheme') !== 'light';
    applyTheme();
  }

  function toggleTheme() {
    isDarkTheme = !isDarkTheme;
    localStorage.setItem('bazisTheme', isDarkTheme ? 'dark' : 'light');
    applyTheme();
  }

  function applyTheme() {
    if (isDarkTheme) {
      document.body.classList.remove('light-theme');
      document.getElementById('themeToggle').textContent = '🌙';
      if (scene) scene.background.setHex(0x1f1f2e);
      if (scene) scene.fog.color.setHex(0x1f1f2e);
    } else {
      document.body.classList.add('light-theme');
      document.getElementById('themeToggle').textContent = '☀️';
      if (scene) scene.background.setHex(0xe8eaef);
      if (scene) scene.fog.color.setHex(0xe8eaef);
    }
  }

  // ========== THREE.JS ==========
  const canvas = document.getElementById('canvas3d');

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(isDarkTheme ? 0x1f1f2e : 0xe8eaef);
    scene.fog = new THREE.FogExp2(isDarkTheme ? 0x1f1f2e : 0xe8eaef, 0.018);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(3, 2.5, 3);

    const ambient = new THREE.AmbientLight(0x404060, 0.85);
    scene.add(ambient);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
    mainLight.position.set(5, 10, 5);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.45);
    fillLight.position.set(-3, 2, -4);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(6, 20, 0x3a6a8a, 0x2a3a4a);
    grid.position.y = -0.02;
    scene.add(grid);

    setupControls();
    animate();
  }

  function setupControls() {
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd, { passive: false });
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('wheel', onWheel, { passive: false });
  }

  function onTouchStart(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1) {
      touchStartPos = { x: touches[0].clientX, y: touches[0].clientY };
      isDragging = true;
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      autoRotate = false;
    } else if (touches.length === 2) {
      isPinching = true;
      isDragging = false;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartCamDist = camDist;
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1 && isDragging) {
      theta -= (touches[0].clientX - prevMouse.x) * 0.008;
      phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (touches[0].clientY - prevMouse.y) * 0.008));
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      updateCamera();
    } else if (touches.length === 2 && isPinching) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      camDist = Math.max(0.5, Math.min(30, pinchStartCamDist + (pinchStartDist - dist) * 0.015));
      updateCamera();
    }
  }

  function onTouchEnd(e) {
    if (touchStartPos && !isPinching) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.changedTouches[0];
      const deltaX = Math.abs(touch.clientX - touchStartPos.x);
      const deltaY = Math.abs(touch.clientY - touchStartPos.y);
      if (deltaX < 5 && deltaY < 5) {
        handleRaycast(touch.clientX, touch.clientY, rect);
      }
    }
    isDragging = false;
    isPinching = false;
    touchStartPos = null;
  }

  function onMouseDown(e) {
    if (e.button === 0) {
      mouseStartPos = { x: e.clientX, y: e.clientY };
      mouseMovedDistance = 0;
      isDragging = true;
      prevMouse = { x: e.clientX, y: e.clientY };
      autoRotate = false;
    }
  }

  function onMouseMove(e) {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    mouseMovedDistance += Math.abs(dx) + Math.abs(dy);
    theta -= dx * 0.005;
    phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  }

  function onMouseUp(e) {
    if (isDragging && mouseStartPos && mouseMovedDistance < 5) {
      const rect = canvas.getBoundingClientRect();
      handleRaycast(mouseStartPos.x, mouseStartPos.y, rect);
    }
    isDragging = false;
    mouseStartPos = null;
    mouseMovedDistance = 0;
  }

  function onWheel(e) {
    e.preventDefault();
    camDist = Math.max(0.5, Math.min(30, camDist + camDist * e.deltaY * 0.001));
    updateCamera();
  }

  function updateCamera() {
    if (isSmoothZoom) return;
    camera.position.x = targetPosition.x + camDist * Math.sin(phi) * Math.sin(theta);
    camera.position.y = targetPosition.y + camDist * Math.cos(phi);
    camera.position.z = targetPosition.z + camDist * Math.sin(phi) * Math.cos(theta);
    camera.lookAt(targetPosition);
  }

  function startSmoothZoom(partId) {
    const part = parts.find(p => p.id === partId);
    if (!part || !part._pos) return;
    zoomTarget.set(part._pos.x, part._pos.y, part._pos.z);
    isSmoothZoom = true;
    autoRotate = false;
  }

  function animateSmoothZoom() {
    if (!isSmoothZoom) return;
    const lerpSpeed = 0.12;
    camera.position.lerp(zoomTarget, lerpSpeed);
    targetPosition.lerp(zoomTarget, lerpSpeed);
    camera.lookAt(targetPosition);
    if (camera.position.distanceTo(zoomTarget) < 0.08) {
      isSmoothZoom = false;
      camDist = camera.position.distanceTo(targetPosition);
    }
  }

  function handleRaycast(clientX, clientY, rect) {
    const mouse = new THREE.Vector2();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const visibleMeshes = Array.from(meshMap.values()).filter(m => m.visible === true);
    const hits = raycaster.intersectObjects(visibleMeshes);

    if (hits.length > 0) {
      const hitId = hits[0].object.userData.partId;
      if (!hiddenSet.has(hitId)) {
        selectPart(hitId);
      }
    }
  }

  // ========== ЗАГРУЗКА И ПОСТРОЕНИЕ ==========
  function autoLayout(partsArr) {
    let minY = Infinity;
    partsArr.forEach(p => { if (p.pos && p.pos.y !== undefined) minY = Math.min(minY, p.pos.y); });
    if (minY === Infinity) minY = 0;
    const sc = 0.001;
    partsArr.forEach(p => {
      if (!p.pos || !p.gab) {
        const cols = Math.ceil(Math.sqrt(partsArr.length));
        const row = Math.floor(p.id / cols);
        const col = p.id % cols;
        p._pos = { x: (col - cols / 2) * 0.15, y: 0, z: (row - cols / 2) * 0.15 };
        p._size = { x: 0.1, y: 0.1, z: 0.1 };
        return;
      }
      p._pos = { x: (p.pos.x + p.gab.w / 2) * sc, y: (p.pos.y - minY + p.gab.h / 2) * sc, z: (p.pos.z + p.gab.d / 2) * sc };
      p._size = { x: Math.max(p.gab.w, 1) * sc, y: Math.max(p.gab.h, 1) * sc, z: Math.max(p.gab.d, 1) * sc };
    });
  }

  function getColor(mat, partData) {
    if (partData?.color) return partData.color;
    const m = (mat || '').toLowerCase();
    const code = (partData?.code || mat || '').toLowerCase();

    const materialDatabase = {
      'h3050': '#d4af8f', 'h3051': '#b89062', 'h3052': '#a67c52', 'h3053': '#3b2a1c', 'h3054': '#2c2c2c',
      'h3055': '#ece7e0', 'h3056': '#5a5a60', 'h3057': '#c8b896', 'h3058': '#e8d4b8',
      'la-oak-light': '#d4af8f', 'la-oak-dark': '#b89062', 'la-wenge': '#3b2a1c',
      'la-white': '#ece7e0', 'la-gray': '#5a5a60',
      'kr-8737': '#d4af8f', 'kr-8738': '#b89062', 'kr-8739': '#3b2a1c', 'kr-8740': '#ece7e0',
    };

    if (materialDatabase[code]) return materialDatabase[code];

    if (m.match(/белый|white|pearl|cream|ivory|светлый лак|глянец белый|крем|слоновая|молочный/)) return '#ece7e0';
    if (m.match(/alpina|polar|arctic|ghost|platinum white|pure white|real white/)) return '#f5f1ed';
    if (m.match(/classic white|cashmere white|soft white/)) return '#f0ede8';
    if (m.match(/сонома|sonoma/)) return '#d4af8f';
    if (m.match(/дуб светлый|light oak|golden oak|honey oak|latte|cappuccino/)) return '#c8b896';
    if (m.match(/дуб янтарь|amber|natural oak/)) return '#d4a574';
    if (m.match(/дуб медовый|дуб медь|медь|copper oak|caramel|toffee|butterscotch/)) return '#d4a880';
    if (m.match(/дуб беленый|bleached|whitewashed oak|scandinavian/)) return '#dcc8b0';
    if (m.match(/^дуб[^а-яё]|^oak[^a-z]|дуб натуральный|natural|classic oak|standard oak|brown oak/)) return '#b89062';
    if (m.match(/дуб красный|red oak|cherry oak|walnut|орех/)) return '#a66b3a';
    if (m.match(/дуб темный|dark oak|aged oak|vintage|antique oak|дуб состаренный/)) return '#8b6f47';
    if (m.match(/венге|wenge|венеция|венецианский/)) return '#3b2a1c';
    if (m.match(/черный|black|ebony|onyx|charcoal|угольный|уголь|ночь|jet|noir|obsidian/)) return '#1a1a1a';
    if (m.match(/черный лак|глянец черный|черный блеск|deep black|pure black|absolute black/)) return '#0f0f0f';
    if (m.match(/графит|graphite|pewter|slate|anthracite|асфальт|бетон|металл|steel|iron/)) return '#5a5a60';
    if (m.match(/серый|grey|gray|серебро|silver|light grey|ash grey|dove grey|taupe|greige/)) return '#7a7a80';
    if (m.match(/темно-серый|dark grey|charcoal grey|gunmetal|storm|concrete/)) return '#4a4a50';
    if (m.match(/светло-серый|light gray|smoky|fog|mist|cloud/)) return '#a0a0a6';
    if (m.match(/серебристый|silver|metallic|chrome|хром/)) return '#d0d8e0';
    if (m.match(/сталь|steel grey/)) return '#909096';
    if (m.match(/зеленый|green|forest|sage|olive|хаки|moss|pistachio|мятный|mint|sea green/)) return '#6b8e6f';
    if (m.match(/синий|blue|navy|aqua|голубой|azure|royal|ocean|sapphire/)) return '#4a7ba7';
    if (m.match(/красный|red|cherry|bordo|бордо|марoon|wine|rust|терракота/)) return '#8b3a3a';
    if (m.match(/коричневый|brown|chocolate|coffee|какао|cocoa|mocca|мокко|caramel/)) return '#9c8e7c';
    if (m.match(/сосна|pine|ель|spruce|лиственница|larch|пихта|fir|кедр|cedar/)) return '#d4c4b0';
    if (m.match(/клен|maple|явор|sycamore/)) return '#e8d4b8';
    if (m.match(/ясень|ash|тополь|poplar|липа|linden/)) return '#c9a882';
    if (m.match(/ольха|alder|осина|aspen|береза|birch/)) return '#a67c52';
    if (m.match(/бук|beech|граб|hornbeam/)) return '#b8956b';
    if (m.match(/ламинат|laminate|пвх|vinyl|пластик|plastic/)) return '#9c8e7c';
    if (m.match(/мдф|лдсп|мдп|древесная плита|chipboard|particle board/)) return '#9c8e7c';
    if (m.match(/кашемир|cashmere|велюр|velvet|бархат|suede|матовый лак/)) return '#c7bcac';
    if (m.match(/глянец|gloss|glossy|лаковый|lacquered/)) return '#b8a896';
    if (m.match(/матовый|matte|matt|flat|satin|шелк|silk/)) return '#8a7f76';
    if (m.match(/мрамор|marble|гранит|granite|камень|stone|бетон|concrete|кирпич|brick/)) return '#a0a0a6';
    if (m.match(/металлик|metallic|перламутр|pearl|блеск|shimmer/)) return '#c0c8d0';

    return '#a89878';
  }

  function buildScene() {
    meshMap.forEach(m => scene.remove(m));
    edgeLineMap.forEach(l => scene.remove(l));
    meshMap.clear();
    edgeLineMap.clear();
    parts.forEach(p => {
      const geo = new THREE.BoxGeometry(p._size.x, p._size.y, p._size.z);
      const mat = new THREE.MeshStandardMaterial({
        color: getColor(p.material, p),
        roughness: 0.55,
        metalness: 0.1,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(p._pos.x, p._pos.y, p._pos.z);
      mesh.userData = { partId: p.id };
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      // Черные края для видимости стыков
      const edges = new THREE.EdgesGeometry(geo, 15);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1a1a1a, linewidth: 1 }));
      line.position.copy(mesh.position);
      scene.add(line);

      // Визуализация пазов/отверстий если есть в JSON
      if (p.grooves && Array.isArray(p.grooves)) {
        p.grooves.forEach(groove => {
          const grooveGeo = new THREE.BoxGeometry(groove.w * 0.001, groove.h * 0.001, groove.d * 0.001);
          const grooveMat = new THREE.MeshStandardMaterial({
            color: 0x333333,
            roughness: 0.8,
            metalness: 0,
            emissive: 0x111111
          });
          const grooveMesh = new THREE.Mesh(grooveGeo, grooveMat);
          const sc = 0.001;
          grooveMesh.position.set(
            mesh.position.x + groove.x * sc,
            mesh.position.y + groove.y * sc,
            mesh.position.z + groove.z * sc
          );
          scene.add(grooveMesh);
        });
      }

      meshMap.set(p.id, mesh);
      edgeLineMap.set(p.id, line);
    });
    centerCamera();
    updateStats();
    renderPartsList();
  }

  function centerCamera() {
    if (!parts.length) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
    parts.forEach(p => {
      if (!p._pos) return;
      minX = Math.min(minX, p._pos.x - p._size.x / 2);
      maxX = Math.max(maxX, p._pos.x + p._size.x / 2);
      minY = Math.min(minY, p._pos.y - p._size.y / 2);
      maxY = Math.max(maxY, p._pos.y + p._size.y / 2);
      minZ = Math.min(minZ, p._pos.z - p._size.z / 2);
      maxZ = Math.max(maxZ, p._pos.z + p._size.z / 2);
    });
    targetPosition.set((minX + maxX) / 2, (minY + maxY) / 2, (minZ + maxZ) / 2);
    const size = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
    camDist = Math.max(size * 1.5, 2);
    updateCamera();
  }

  function selectPart(id) {
    selectedId = id;
    meshMap.forEach(mesh => {
      mesh.material.emissive.setHex(0x000000);
      mesh.material.emissiveIntensity = 0;
    });
    edgeLineMap.forEach(line => {
      line.material.color.setHex(0x1a1a1a);
    });
    const selected = meshMap.get(id);
    const selectedLine = edgeLineMap.get(id);
    if (selected) {
      selected.material.emissive.setHex(0x00d4ff);
      selected.material.emissiveIntensity = 0.5;
    }
    if (selectedLine) {
      selectedLine.material.color.setHex(0x00d4ff);
    }
    if (xrayActive) applyXray();
    updateSheet(parts.find(p => p.id === id));
    renderPartsList();
    openSheet();
  }

  function updateSheet(p) {
    const container = document.getElementById('sheetContent');
    if (!p) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:12px;font-size:12px;">👆 Нажмите на деталь</div>';
      return;
    }
    const isScanned = scannedSet.has(p.id);
    const dimStr = `${p.L || '—'} × ${p.W || '—'} × ${p.T || '—'}`;
    container.innerHTML = `
      <div class="detail-card">
        <div class="detail-row">
          <span class="detail-label">Позиция:</span>
          <span class="detail-value">${escapeHtml(p.name || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Артикул:</span>
          <span class="detail-code">${escapeHtml(p.code || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Размеры (L×W×T):</span>
          <span class="detail-value" style="font-family: monospace;">${dimStr}</span>
        </div>
        <div class="detail-row" style="margin-top: 6px;">
          <span class="material-tag">${escapeHtml(p.material || 'Материал')}</span>
          <span class="status-badge ${isScanned ? 'scanned' : 'waiting'}">${isScanned ? '✅ ОТСКАНИРОВАНО' : '⏳ ОЖИДАЕТ'}</span>
        </div>
        <div class="action-buttons">
          <button class="action-btn" id="hideBtn">🙈 Скрыть</button>
          <button class="action-btn" id="showAllBtn">👁 Показать</button>
          <button class="action-btn" id="zoomBtn">🔍 Приблизить</button>
        </div>
      </div>
    `;
    document.getElementById('hideBtn')?.addEventListener('click', (e) => { e.stopPropagation(); toggleVisibility(p.id); });
    document.getElementById('showAllBtn')?.addEventListener('click', (e) => { e.stopPropagation(); showAllParts(); });
    document.getElementById('zoomBtn')?.addEventListener('click', (e) => { e.stopPropagation(); startSmoothZoom(p.id); });
  }

  function toggleVisibility(id) {
    const mesh = meshMap.get(id);
    const line = edgeLineMap.get(id);
    if (!mesh) return;
    if (hiddenSet.has(id)) {
      hiddenSet.delete(id);
      mesh.visible = true;
      if (line) line.visible = true;
    } else {
      hiddenSet.add(id);
      mesh.visible = false;
      if (line) line.visible = false;
      if (selectedId === id) {
        selectedId = null;
        updateSheet(null);
        closeSheet();
      }
    }
    renderPartsList();
    if (xrayActive) applyXray();
    showToast(`${hiddenSet.has(id) ? '🙈' : '👁'} Деталь ${hiddenSet.has(id) ? 'скрыта' : 'показана'}`);
  }

  function showAllParts() {
    hiddenSet.clear();
    meshMap.forEach(mesh => { mesh.visible = true; });
    edgeLineMap.forEach(line => { line.visible = true; });
    renderPartsList();
    if (xrayActive) applyXray();
    showToast('👁 Все детали показаны');
  }

  function applyXray() {
    meshMap.forEach((mesh, id) => {
      if (xrayActive && selectedId !== null && id !== selectedId && mesh.visible) {
        mesh.material.transparent = true;
        mesh.material.opacity = 0.15;
      } else {
        mesh.material.transparent = false;
        mesh.material.opacity = 1;
      }
    });
  }

  function toggleXray() {
    xrayActive = !xrayActive;
    document.getElementById('xrayBtn').classList.toggle('active', xrayActive);
    if (!xrayActive) {
      meshMap.forEach(m => { m.material.transparent = false; m.material.opacity = 1; });
    } else {
      applyXray();
    }
  }

  function updateStats() {
    const total = parts.length;
    const scanned = scannedSet.size;
    const percent = total > 0 ? Math.round((scanned / total) * 100) : 0;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('scannedCount').textContent = scanned;
    document.getElementById('progressFill').style.width = percent + '%';
  }

  function renderPartsList() {
    const container = document.getElementById('partsList');
    if (!container) return;
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtered = parts;
    if (searchTerm) {
      filtered = parts.filter(p =>
        (p.name || '').toLowerCase().includes(searchTerm) ||
        (p.code || '').toLowerCase().includes(searchTerm)
      );
    }
    if (filtered.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-secondary);font-size:12px;">📁 ' + (searchTerm ? 'Ничего не найдено' : 'Загрузите JSON') + '</div>';
      return;
    }
    container.innerHTML = '';
    filtered.forEach(p => {
      const isHidden = hiddenSet.has(p.id);
      const div = document.createElement('div');
      div.className = `part-item ${selectedId === p.id ? 'active' : ''}`;
      div.style.opacity = isHidden ? '0.5' : '1';
      div.innerHTML = `
        <div class="part-swatch" style="background:${getColor(p.material, p)}"></div>
        <div class="part-info">
          <div class="part-name">${escapeHtml(p.name || '—')}</div>
          <div class="part-code">${escapeHtml(p.code || '—')}</div>
        </div>
        <div class="check ${scannedSet.has(p.id) ? 'done' : ''}">${scannedSet.has(p.id) ? '✅' : '○'}</div>
      `;
      div.addEventListener('click', () => selectPart(p.id));
      container.appendChild(div);
    });
  }

  function showToast(msg) {
    let toast = document.getElementById('customToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'customToast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function printSpecification() {
    const w = window.open('', '_blank');
    let html = '<h1>Спецификация</h1><table border="1" cellpadding="8"><tr><th>Позиция</th><th>Артикул</th><th>Материал</th><th>Размеры</th><th>Статус</th></tr>';
    parts.forEach(p => {
      const status = scannedSet.has(p.id) ? '✓ Собрано' : '◯ Ожидает';
      const dims = `${p.L || '—'} × ${p.W || '—'} × ${p.T || '—'}`;
      html += `<tr><td>${escapeHtml(p.name)}</td><td>${escapeHtml(p.code)}</td><td>${escapeHtml(p.material)}</td><td>${dims}</td><td>${status}</td></tr>`;
    });
    html += '</table>';
    w.document.write(html);
    w.document.close();
    w.print();
  }

  function exportJSON() {
    const exportData = {
      project: document.getElementById('projectTitle').textContent,
      exportDate: new Date().toISOString(),
      totalParts: parts.length,
      scannedParts: scannedSet.size,
      progress: Math.round((scannedSet.size / parts.length) * 100) + '%',
      parts: parts.map(p => ({
        id: p.id,
        name: p.name,
        code: p.code,
        material: p.material,
        dimensions: { L: p.L, W: p.W, T: p.T },
        size: p._size,
        position: p._pos,
        grooves: p.grooves || [],
        scanned: scannedSet.has(p.id),
        hidden: hiddenSet.has(p.id)
      }))
    };
    const dataStr = JSON.stringify(exportData, null, 2);
    const dataBlob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `bazis-report-${Date.now()}.json`;
    link.click();
    showToast('✅ JSON экспортирован');
  }

  // ========== QR СКАНЕР ==========
  let scanInterval, videoStream;

  function openScanner() {
    document.getElementById('scannerModal').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        videoStream = stream;
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.play();
        startQRScan();
      })
      .catch(() => showToast('❌ Нет доступа к камере'));
  }

  function closeScanner() {
    document.getElementById('scannerModal').classList.add('hidden');
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    if (scanInterval) clearInterval(scanInterval);
  }

  function startQRScan() {
    const video = document.getElementById('video');
    const qrCanvas = document.getElementById('qrCanvas');
    const ctx = qrCanvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      qrCanvas.width = video.videoWidth;
      qrCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code) {
        handleScan(code.data);
        closeScanner();
      }
    }, 200);
  }

  function handleManualCode() {
    const code = document.getElementById('manualCode').value.trim();
    if (code) {
      handleScan(code);
      closeScanner();
    }
  }

  function handleScan(code) {
    let found = parts.find(p => p.code === code || p.code?.trim() === code.trim() || p.code?.toLowerCase() === code.toLowerCase());
    if (!found) found = parts.find(p => code.includes(p.code) || p.code?.includes(code));
    if (!found) {
      showToast('❌ Деталь не найдена');
      return;
    }
    scannedSet.add(found.id);
    updateStats();
    selectPart(found.id);
    renderPartsList();
    startSmoothZoom(found.id);
    showToast(`✅ ${found.name}`);
    saveProgress();
  }

  // ========== СОХРАНЕНИЕ ПРОГРЕССА ==========
  function saveProgress() {
    const data = {
      scanned: Array.from(scannedSet),
      hidden: Array.from(hiddenSet),
      projectTitle: document.getElementById('projectTitle').textContent
    };
    localStorage.setItem('bazisProgress', JSON.stringify(data));
  }

  function loadProgress() {
    const data = JSON.parse(localStorage.getItem('bazisProgress') || '{}');
    if (data.scanned) scannedSet = new Set(data.scanned);
    if (data.hidden) hiddenSet = new Set(data.hidden);
  }

  function resetProgress() {
    if (confirm('Вы уверены? Сбросить весь прогресс?')) {
      scannedSet.clear();
      hiddenSet.clear();
      meshMap.forEach(m => m.visible = true);
      edgeLineMap.forEach(l => l.visible = true);
      selectedId = null;
      updateSheet(null);
      closeSheet();
      updateStats();
      renderPartsList();
      localStorage.removeItem('bazisProgress');
      showToast('🔄 Прогресс сброшен');
    }
  }

  // ========== СОБЫТИЯ ==========
  function openDrawer() { document.getElementById('drawer').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
  function openSheet() { document.getElementById('bottomSheet').classList.add('open'); }
  function closeSheet() { document.getElementById('bottomSheet').classList.remove('open'); }
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        parts = data.parts || data;
        parts.forEach((p, idx) => { if (p.id === undefined) p.id = idx; });
        autoLayout(parts);
        buildScene();
        selectedId = null;
        loadProgress();
        centerCamera();
        closeDrawer();
        showToast(`✅ Загружено ${parts.length} деталей`);
        document.getElementById('projectTitle').textContent = file.name.replace('.json', '');
        saveProgress();
      } catch (err) {
        showToast('❌ Ошибка файла: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  });

  document.getElementById('menuBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('closeSheetBtn').addEventListener('click', closeSheet);
  document.getElementById('scanBtn').addEventListener('click', openScanner);
  document.getElementById('rotateBtn').addEventListener('click', () => { autoRotate = !autoRotate; });
  document.getElementById('resetViewBtn').addEventListener('click', () => { centerCamera(); autoRotate = false; isSmoothZoom = false; });
  document.getElementById('xrayBtn').addEventListener('click', () => toggleXray());
  document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
  document.getElementById('printBtn').addEventListener('click', printSpecification);
  document.getElementById('exportBtn').addEventListener('click', exportJSON);
  document.getElementById('closeScannerBtn').addEventListener('click', closeScanner);
  document.getElementById('manualSubmit').addEventListener('click', handleManualCode);
  document.getElementById('searchInput').addEventListener('input', renderPartsList);

  // Анимация
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isDragging && !isSmoothZoom) {
      theta += 0.0025;
      updateCamera();
    }
    if (isSmoothZoom) animateSmoothZoom();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  initTheme();
  initThree();
  updateStats();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bazis Scan Pro — 3D сканер мебели</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #16162a;
      --bg-tertiary: #1e1e36;
      --bg-card: #1a1a30;
      --text-primary: #eeeef5;
      --text-secondary: #8888aa;
      --border: rgba(80, 120, 255, 0.12);
      --accent: #5b7fff;
      --accent-glow: rgba(91, 127, 255, 0.25);
      --accent2: #ff6b6b;
      --success: #4ade80;
      --warning: #fbbf24;
      --canvas-bg: #0f0f1a;
    }
    body.light-theme {
      --bg-primary: #f0f1f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e8e9ef;
      --bg-card: #f5f6fa;
      --text-primary: #1a1a2e;
      --text-secondary: #6b6b8a;
      --border: rgba(40, 60, 120, 0.15);
      --accent: #3b5ddb;
      --accent-glow: rgba(59, 93, 219, 0.2);
      --accent2: #e04040;
      --success: #16a34a;
      --warning: #d97706;
      --canvas-bg: #e8e9ef;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Roboto, sans-serif;
      background: var(--bg-primary);
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }
    #canvas3d {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    /* TOP PANEL */
    .top-panel {
      position: fixed; top: 0; left: 0; right: 0;
      height: 46px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      z-index: 20;
      backdrop-filter: blur(20px);
    }
    .top-left { display: flex; align-items: center; gap: 8px; }
    .top-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      width: 36px; height: 36px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .top-btn:active { transform: scale(0.9); background: var(--accent); color: #fff; }
    .project-title {
      font-size: 13px; font-weight: 600;
      color: var(--text-primary);
      max-width: 140px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .stats-bar { display: flex; gap: 14px; align-items: center; font-size: 11px; }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-value { font-weight: 700; color: var(--accent); font-size: 12px; }
    .progress-container { flex: 1; max-width: 160px; }
    .progress-bar {
      width: 100%; height: 3px;
      background: rgba(91, 127, 255, 0.1);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      transition: width 0.3s ease; border-radius: 2px;
    }

    /* BOTTOM TOOLBAR */
    .bottom-toolbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 6px 6px 6px;
      z-index: 19;
      backdrop-filter: blur(20px);
    }
    .toolbar-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      width: 40px; height: 40px;
      border-radius: 11px;
      font-size: 17px;
      cursor: pointer;
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .toolbar-btn:active { transform: scale(0.9); background: var(--accent); color: #fff; }
    .toolbar-btn.active { background: var(--accent-glow); border-color: var(--accent); }

    /* BOTTOM SHEET */
    .bottom-sheet {
      position: fixed;
      bottom: 52px; left: 0; right: 0;
      background: var(--bg-secondary);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 18;
      border-top: 1px solid var(--border);
      max-height: 32vh;
      backdrop-filter: blur(24px);
    }
    .bottom-sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 3px;
      background: var(--text-secondary);
      opacity: 0.2; border-radius: 3px;
      margin: 10px auto 6px;
    }
    .sheet-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 16px 6px;
    }
    .sheet-title {
      font-size: 10px; font-weight: 700;
      color: var(--accent);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .sheet-close {
      background: none; border: none;
      color: var(--text-secondary);
      font-size: 18px; cursor: pointer;
      padding: 4px 8px;
    }
    .sheet-content {
      padding: 0 16px 14px;
      overflow-y: auto;
      max-height: calc(32vh - 40px);
    }

    /* DETAIL CARD */
    .detail-card { display: flex; flex-direction: column; gap: 6px; }
    .detail-row {
      display: flex; justify-content: space-between;
      align-items: baseline; gap: 8px;
    }
    .detail-label {
      font-size: 9px; color: var(--text-secondary);
      letter-spacing: 0.5px; text-transform: uppercase; flex-shrink: 0;
    }
    .detail-value {
      font-size: 12px; color: var(--text-primary); font-weight: 500;
    }
    .detail-code {
      font-size: 11px; color: var(--accent);
      font-family: 'Monaco', 'Menlo', monospace;
    }
    .dims-row { display: flex; gap: 6px; margin: 2px 0; }
    .dim {
      background: var(--accent-glow);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 9px; flex: 1; text-align: center;
    }
    .dim-label {
      color: var(--text-secondary); display: block;
      font-size: 7px; letter-spacing: 0.3px;
    }
    .dim-value {
      color: var(--accent); font-weight: 700; font-size: 11px;
    }
    .material-tag {
      font-size: 8px; color: #ff9f6e;
      background: rgba(255, 140, 90, 0.1);
      padding: 2px 8px; border-radius: 6px;
      border: 1px solid rgba(255, 140, 90, 0.15);
      display: inline-block; width: fit-content;
    }
    .status-badge {
      font-size: 9px; padding: 2px 8px;
      border-radius: 6px; display: inline-block; font-weight: 600;
    }
    .status-badge.scanned {
      color: var(--success);
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }
    .status-badge.waiting {
      color: var(--warning);
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .action-buttons { display: flex; gap: 6px; margin-top: 6px; }
    .action-btn {
      flex: 1;
      background: var(--accent-glow);
      border: 1px solid var(--border);
      padding: 6px 0; border-radius: 8px;
      font-size: 10px; color: var(--accent);
      text-align: center; cursor: pointer; font-weight: 600;
      transition: all 0.15s;
    }
    .action-btn:active { background: var(--accent); color: #fff; }
    .module-badge {
      font-size: 8px; padding: 2px 8px;
      border-radius: 6px; display: inline-block;
      font-weight: 600; letter-spacing: 0.3px;
      color: #818cf8; background: rgba(129, 140, 248, 0.12);
      border: 1px solid rgba(129, 140, 248, 0.2);
    }
    .assembly-hint {
      font-size: 9px; color: var(--text-secondary);
      background: var(--bg-tertiary);
      padding: 6px 10px; border-radius: 6px;
      border-left: 2px solid var(--accent);
      margin-top: 4px;
    }

    /* DRAWER */
    .drawer {
      position: fixed;
      top: 46px; left: 0; bottom: 0;
      width: 85%; max-width: 340px;
      background: var(--bg-secondary);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 25;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      backdrop-filter: blur(28px);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .drawer-title {
      font-size: 11px; font-weight: 700;
      color: var(--accent); letter-spacing: 1px;
    }
    .drawer-close {
      background: none; border: none;
      font-size: 18px; color: var(--text-secondary); cursor: pointer;
    }
    .drawer-search {
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }
    .search-input {
      width: 100%; padding: 7px 10px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary); font-size: 12px;
    }
    .search-input::placeholder { color: var(--text-secondary); }
    .drawer-content {
      flex: 1; overflow-y: auto; padding: 10px;
    }
    .upload-btn {
      width: 100%;
      background: var(--accent-glow);
      border: 1px dashed var(--border);
      padding: 10px; border-radius: 10px;
      color: var(--accent); font-size: 12px;
      text-align: center; margin-bottom: 10px;
      cursor: pointer; font-weight: 600;
    }
    .upload-btn:active { background: var(--accent); color: #fff; }
    .drawer-actions {
      display: flex; gap: 6px; margin-bottom: 8px;
    }
    .drawer-action-btn {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      padding: 7px 0; border-radius: 8px;
      font-size: 10px; color: var(--text-secondary);
      text-align: center; cursor: pointer; font-weight: 600;
      transition: all 0.15s;
    }
    .drawer-action-btn:active { background: var(--accent); color: #fff; }

    /* MODULE GROUP */
    .module-group { margin-bottom: 8px; }
    .module-header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .module-header:active { background: var(--accent-glow); }
    .module-dot {
      width: 10px; height: 10px;
      border-radius: 3px; flex-shrink: 0;
    }
    .module-name {
      font-size: 10px; font-weight: 700;
      color: var(--text-primary); flex: 1;
      letter-spacing: 0.3px;
    }
    .module-count {
      font-size: 9px; color: var(--text-secondary);
      background: var(--bg-primary);
      padding: 1px 6px; border-radius: 4px;
    }
    .module-arrow {
      font-size: 10px; color: var(--text-secondary);
      transition: transform 0.2s;
    }
    .module-arrow.open { transform: rotate(90deg); }
    .module-parts { padding-left: 8px; }
    .module-parts.collapsed { display: none; }

    /* PART ITEM */
    .part-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px;
      background: rgba(91, 127, 255, 0.03);
      border-radius: 8px;
      margin-bottom: 3px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .part-item:active { background: var(--accent-glow); }
    .part-item.active {
      background: var(--accent-glow);
      border-color: var(--accent);
    }
    .part-swatch {
      width: 28px; height: 28px;
      border-radius: 6px; flex-shrink: 0;
    }
    .part-info { flex: 1; min-width: 0; }
    .part-name {
      font-size: 10px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .part-code {
      font-size: 8px; color: var(--accent);
      margin-top: 1px;
      font-family: 'Monaco', 'Menlo', monospace;
    }
    .part-dims {
      font-size: 7px; color: var(--text-secondary);
      margin-top: 1px;
    }
    .check { font-size: 12px; flex-shrink: 0; }
    .check.done { color: var(--success); }

    /* MATERIAL SUMMARY PANEL */
    .material-summary {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg-tertiary);
    }
    .summary-title {
      font-size: 9px; font-weight: 700;
      color: var(--accent); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 3px 0;
      font-size: 10px;
    }
    .summary-label { color: var(--text-secondary); }
    .summary-val { color: var(--text-primary); font-weight: 600; }

    /* MODAL */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      backdrop-filter: blur(8px);
    }
    .modal.hidden { display: none; }
    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      width: 90%; max-width: 320px;
    }
    .modal-title {
      color: var(--accent);
      text-align: center; margin-bottom: 14px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.5px;
    }
    #video {
      width: 100%; aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid var(--border);
      margin-bottom: 14px;
    }
    .input-field {
      width: 100%; padding: 10px;
      margin-bottom: 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
    }
    .input-field::placeholder { color: var(--text-secondary); }
    .modal-btn {
      width: 100%; padding: 10px;
      background: var(--accent-glow);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--accent);
      font-weight: 700; font-size: 12px;
      cursor: pointer; margin-bottom: 6px;
      transition: all 0.15s;
    }
    .modal-btn:active { background: var(--accent); color: #fff; }
    .modal-btn.secondary {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 64px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 10px;
      color: var(--accent);
      font-size: 11px; z-index: 100;
      pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease;
      font-weight: 600;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ASSEMBLY GUIDE OVERLAY */
    .assembly-overlay {
      position: fixed;
      top: 50px; left: 0; right: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      z-index: 17;
      display: none;
      align-items: center; gap: 8px;
      backdrop-filter: blur(20px);
    }
    .assembly-overlay.active { display: flex; }
    .assembly-step {
      font-size: 11px; color: var(--accent); font-weight: 700;
      min-width: 60px;
    }
    .assembly-info {
      flex: 1; font-size: 10px; color: var(--text-primary);
    }
    .assembly-nav {
      display: flex; gap: 4px;
    }
    .assembly-nav button {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      width: 32px; height: 32px;
      border-radius: 8px; font-size: 14px;
      color: var(--accent); cursor: pointer;
    }
    .assembly-nav button:active {
      background: var(--accent); color: #fff;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(91, 127, 255, 0.15); border-radius: 2px; }
  </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- TOP PANEL -->
<div class="top-panel">
  <div class="top-left">
    <button class="top-btn" id="themeToggle" title="Тема">🌙</button>
    <span class="project-title" id="projectTitle">Bazis Scan Pro</span>
  </div>
  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <span style="color:var(--text-secondary)">Собрано:</span>
      <span class="stat-value"><span id="scannedCount">0</span>/<span id="totalCount">0</span></span>
    </div>
  </div>
  <div style="display:flex;gap:4px">
    <button class="top-btn" id="statsBtn" title="Статистика">📊</button>
    <button class="top-btn" id="printBtn" title="Печать">🖨️</button>
    <button class="top-btn" id="menuBtn" title="Меню">☰</button>
  </div>
</div>

<!-- ASSEMBLY GUIDE -->
<div class="assembly-overlay" id="assemblyOverlay">
  <div class="assembly-step" id="assemblyStepLabel">Шаг 1/200</div>
  <div class="assembly-info" id="assemblyInfo">Деталь: загрузите JSON</div>
  <div class="assembly-nav">
    <button id="asmPrev">◀</button>
    <button id="asmPlay">▶</button>
    <button id="asmNext">▶</button>
    <button id="asmClose">✕</button>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div id="bottomSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">ДЕТАЛЬ</span>
    <button class="sheet-close" id="closeSheetBtn">✕</button>
  </div>
  <div id="sheetContent" class="sheet-content">
    <div style="text-align:center;color:var(--text-secondary);padding:10px;font-size:11px;">👆 Нажмите на деталь в 3D или списке</div>
  </div>
</div>

<!-- BOTTOM TOOLBAR -->
<div class="bottom-toolbar">
  <button class="toolbar-btn" id="scanBtn" title="Сканировать QR">📷</button>
  <button class="toolbar-btn" id="xrayBtn" title="X-Ray">👁</button>
  <button class="toolbar-btn" id="explodeBtn" title="Взрыв">💥</button>
  <button class="toolbar-btn" id="rotateBtn" title="Авто-вращение">⟳</button>
  <button class="toolbar-btn" id="resetViewBtn" title="Центр">⌂</button>
  <button class="toolbar-btn" id="focusBtn" title="Фокус на выбранной">🎯</button>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span class="drawer-title">📋 ДЕТАЛИ И МОДУЛИ</span>
    <button class="drawer-close" id="closeDrawerBtn">✕</button>
  </div>
  <div class="drawer-search">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по артикулу или названию...">
  </div>
  <div class="drawer-content">
    <div class="upload-btn" id="uploadBtn">📂 ЗАГРУЗИТЬ JSON</div>
    <div class="drawer-actions">
      <button class="drawer-action-btn" id="assembleBtn" title="Пошаговая сборка">🔧 Пошаговая сборка</button>
      <button class="drawer-action-btn" id="resetProgressBtn" title="Сбросить прогресс">🔄 Сбросить прогресс</button>
    </div>
    <div id="partsList"></div>
  </div>
  <input type="file" id="fileInput" accept=".json" hidden>
</div>

<!-- QR SCANNER -->
<div id="scannerModal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">📷 НАВЕДИТЕ НА QR</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="qrCanvas" hidden></canvas>
    <input type="text" id="manualCode" placeholder="Или введите артикул вручную" class="input-field">
    <button id="manualSubmit" class="modal-btn">✓ Проверить</button>
    <button id="closeScannerBtn" class="modal-btn secondary">Закрыть</button>
  </div>
</div>

<!-- STATS MODAL -->
<div id="statsModal" class="modal hidden">
  <div class="modal-box" style="max-width:360px">
    <div class="modal-title">📊 СТАТИСТИКА ПРОЕКТА</div>
    <div id="statsContent" style="font-size:12px;color:var(--text-primary)"></div>
    <button class="modal-btn secondary" onclick="document.getElementById('statsModal').classList.add('hidden')" style="margin-top:12px">Закрыть</button>
  </div>
</div>

<script>
  let parts = [];
  let selectedId = null;
  let scannedSet = new Set();
  let hiddenSet = new Set();
  let meshMap = new Map();
  let edgeLineMap = new Map();
  let xrayActive = false;
  let isDarkTheme = true;
  let explodeActive = false;
  let explodeProgress = 0;
  let originalPositions = new Map();
  let moduleMap = new Map();
  let assemblyMode = false;
  let assemblyIndex = 0;
  let assemblyOrder = [];
  let assemblyPlaying = false;
  let assemblyTimer = null;

  let scene, camera, renderer;
  let theta = 0.8, phi = 0.9, camDist = 3.5;
  let targetPosition = new THREE.Vector3(0, 0.5, 0);
  let isDragging = false, prevMouse = { x: 0, y: 0 };
  let autoRotate = false;
  let isSmoothZoom = false;
  let zoomTarget = new THREE.Vector3();
  let touchStartPos = null;
  let isPinching = false;
  let pinchStartDist = 0, pinchStartCamDist = 0;
  let mouseStartPos = null;
  let mouseMovedDistance = 0;

  const MODULE_COLORS = [
    '#5b7fff', '#ff6b6b', '#4ade80', '#fbbf24', '#a78bfa',
    '#f472b6', '#38bdf8', '#fb923c', '#34d399', '#e879f9',
    '#06b6d4', '#8b5cf6', '#ef4444', '#10b981', '#f59e0b',
    '#ec4899', '#14b8a6', '#84cc16', '#6366f1', '#f97316',
    '#22d3ee', '#a855f7', '#e11d48', '#059669', '#d97706',
    '#d946ef', '#0891b2', '#65a30d', '#4f46e5', '#ea580c',
  ];
  const colorCache = new Map();
  let colorIdx = 0;

  function getModulePrefix(code) {
    if (!code) return 'OTHER';
    const m = code.match(/^(MEDC_\d+|KUH_\d+_\d+|MUD_\d+|D-\d+)/);
    if (m) return m[1];
    return 'OTHER';
  }

  function getModuleKey(code) {
    const prefix = getModulePrefix(code);
    if (prefix === 'OTHER') return 'OTHER';
    if (prefix.startsWith('D-')) return 'HARDWARE';
    const groupMatch = prefix.match(/^(MEDC_\d+|KUH_\d+|MUD_\d+)/);
    if (groupMatch) return groupMatch[1];
    return prefix;
  }

  function getModuleColor(code) {
    const key = getModuleKey(code);
    if (key === 'HARDWARE') return '#94a3b8';
    if (key === 'OTHER') return '#6b7280';
    if (colorCache.has(key)) return colorCache.get(key);
    const c = MODULE_COLORS[colorIdx % MODULE_COLORS.length];
    colorIdx++;
    colorCache.set(key, c);
    return c;
  }

  function getModuleName(code) {
    const key = getModuleKey(code);
    if (key === 'HARDWARE') return 'Фурнитура';
    if (key === 'OTHER') return 'Прочее';
    if (key.startsWith('MEDC_')) {
      const n = key.replace('MEDC_', '');
      return 'Медицинский ' + n;
    }
    if (key.startsWith('KUH_')) {
      const n = key.replace('KUH_', '');
      return 'Шкаф ' + n;
    }
    if (key.startsWith('MUD_')) {
      const n = key.replace('MUD_', '');
      return 'Тумба ' + n;
    }
    return key;
  }

  // THEME
  function initTheme() {
    isDarkTheme = localStorage.getItem('bazisTheme') !== 'light';
    applyTheme();
  }
  function toggleTheme() {
    isDarkTheme = !isDarkTheme;
    localStorage.setItem('bazisTheme', isDarkTheme ? 'dark' : 'light');
    applyTheme();
  }
  function applyTheme() {
    if (isDarkTheme) {
      document.body.classList.remove('light-theme');
      document.getElementById('themeToggle').textContent = '🌙';
      if (scene) scene.background.setHex(0x0f0f1a);
      if (scene) scene.fog.color.setHex(0x0f0f1a);
    } else {
      document.body.classList.add('light-theme');
      document.getElementById('themeToggle').textContent = '☀️';
      if (scene) scene.background.setHex(0xe8e9ef);
      if (scene) scene.fog.color.setHex(0xe8e9ef);
    }
  }

  // THREE.JS
  const canvas = document.getElementById('canvas3d');

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    scene = new THREE.Scene();
    scene.background = new THREE.Color(isDarkTheme ? 0x0f0f1a : 0xe8e9ef);
    scene.fog = new THREE.FogExp2(isDarkTheme ? 0x0f0f1a : 0xe8e9ef, 0.003);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 500);
    camera.position.set(3, 2.5, 3);
    const ambient = new THREE.AmbientLight(0x606080, 1.2);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
    mainLight.position.set(10, 20, 10);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.set(1024, 1024);
    mainLight.shadow.camera.left = -50;
    mainLight.shadow.camera.right = 50;
    mainLight.shadow.camera.top = 50;
    mainLight.shadow.camera.bottom = -50;
    mainLight.shadow.bias = -0.001;
    mainLight.shadow.radius = 4;
    scene.add(mainLight);
    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.45);
    fillLight.position.set(-5, 4, -8);
    scene.add(fillLight);
    const grid = new THREE.GridHelper(40, 80, 0x2a3a5a, 0x1a2a3a);
    grid.position.y = -0.02;
    scene.add(grid);
    setupControls();
    animate();
  }

  function setupControls() {
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd, { passive: false });
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('wheel', onWheel, { passive: false });
  }

  function onTouchStart(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1) {
      touchStartPos = { x: touches[0].clientX, y: touches[0].clientY };
      isDragging = true;
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      autoRotate = false;
    } else if (touches.length === 2) {
      isPinching = true; isDragging = false;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartCamDist = camDist;
    }
  }
  function onTouchMove(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1 && isDragging) {
      theta -= (touches[0].clientX - prevMouse.x) * 0.008;
      phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (touches[0].clientY - prevMouse.y) * 0.008));
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      updateCamera();
    } else if (touches.length === 2 && isPinching) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      camDist = Math.max(0.5, Math.min(80, pinchStartCamDist + (pinchStartDist - dist) * 0.015));
      updateCamera();
    }
  }
  function onTouchEnd(e) {
    if (touchStartPos && !isPinching) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.changedTouches[0];
      if (Math.abs(touch.clientX - touchStartPos.x) < 5 && Math.abs(touch.clientY - touchStartPos.y) < 5) {
        handleRaycast(touch.clientX, touch.clientY, rect);
      }
    }
    isDragging = false; isPinching = false; touchStartPos = null;
  }
  function onMouseDown(e) {
    if (e.button === 0) {
      mouseStartPos = { x: e.clientX, y: e.clientY };
      mouseMovedDistance = 0;
      isDragging = true;
      prevMouse = { x: e.clientX, y: e.clientY };
      autoRotate = false;
    }
  }
  function onMouseMove(e) {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    mouseMovedDistance += Math.abs(dx) + Math.abs(dy);
    theta -= dx * 0.005;
    phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  }
  function onMouseUp() {
    if (isDragging && mouseStartPos && mouseMovedDistance < 5) {
      const rect = canvas.getBoundingClientRect();
      handleRaycast(mouseStartPos.x, mouseStartPos.y, rect);
    }
    isDragging = false; mouseStartPos = null; mouseMovedDistance = 0;
  }
  function onWheel(e) {
    e.preventDefault();
    camDist = Math.max(0.5, Math.min(80, camDist + camDist * e.deltaY * 0.001));
    updateCamera();
  }
  function updateCamera() {
    if (isSmoothZoom) return;
    camera.position.x = targetPosition.x + camDist * Math.sin(phi) * Math.sin(theta);
    camera.position.y = targetPosition.y + camDist * Math.cos(phi);
    camera.position.z = targetPosition.z + camDist * Math.sin(phi) * Math.cos(theta);
    camera.lookAt(targetPosition);
  }
  function startSmoothZoom(partId) {
    const part = parts.find(p => p.id === partId);
    if (!part || !part._pos) return;
    zoomTarget.set(part._pos.x, part._pos.y, part._pos.z);
    isSmoothZoom = true;
    autoRotate = false;
  }
  function animateSmoothZoom() {
    if (!isSmoothZoom) return;
    const lerpSpeed = 0.12;
    camera.position.lerp(zoomTarget, lerpSpeed);
    targetPosition.lerp(zoomTarget, lerpSpeed);
    camera.lookAt(targetPosition);
    if (camera.position.distanceTo(zoomTarget) < 0.08) {
      isSmoothZoom = false;
      camDist = camera.position.distanceTo(targetPosition);
    }
  }
  function handleRaycast(clientX, clientY, rect) {
    const mouse = new THREE.Vector2();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const visibleMeshes = Array.from(meshMap.values()).filter(m => m.visible === true);
    const hits = raycaster.intersectObjects(visibleMeshes);
    if (hits.length > 0) {
      const hitId = hits[0].object.userData.partId;
      if (!hiddenSet.has(hitId)) selectPart(hitId);
    }
  }

  // LAYOUT
  function autoLayout(partsArr) {
    let minY = Infinity;
    partsArr.forEach(p => { if (p.pos && p.pos.y !== undefined) minY = Math.min(minY, p.pos.y); });
    if (minY === Infinity) minY = 0;
    const sc = 0.001;
    partsArr.forEach(p => {
      if (!p.pos || !p.gab) {
        const cols = Math.ceil(Math.sqrt(partsArr.length));
        const row = Math.floor(p.id / cols);
        const col = p.id % cols;
        p._pos = { x: (col - cols / 2) * 0.15, y: 0, z: (row - cols / 2) * 0.15 };
        p._size = { x: 0.1, y: 0.1, z: 0.1 };
        return;
      }
      p._pos = { x: (p.pos.x + p.gab.w / 2) * sc, y: (p.pos.y - minY + p.gab.h / 2) * sc, z: (p.pos.z + p.gab.d / 2) * sc };
      p._size = { x: Math.max(p.gab.w, 1) * sc, y: Math.max(p.gab.h, 1) * sc, z: Math.max(p.gab.d, 1) * sc };
    });
  }

  function getColor(mat, partData) {
    if (partData?.color) return partData.color;
    const m = (mat || '').toLowerCase();
    const code = (partData?.code || mat || '').toLowerCase();
    const materialDatabase = {
      'h3050': '#d4af8f', 'h3051': '#b89062', 'h3052': '#a67c52', 'h3053': '#3b2a1c',
      'la-oak-light': '#d4af8f', 'la-oak-dark': '#b89062', 'la-wenge': '#3b2a1c',
      'la-white': '#ece7e0', 'la-gray': '#5a5a60',
    };
    if (materialDatabase[code]) return materialDatabase[code];
    if (m.match(/гикори|рокфорд|walnut|hickory/)) return '#8b6f47';
    if (m.match(/каселла|casella|коричнев|brown/)) return '#7a5c3a';
    if (m.match(/ликольн|lincoln|орех|nut/)) return '#6b5340';
    if (m.match(/белый|white|pearl|cream|ivory/)) return '#ece7e0';
    if (m.match(/сонома|sonoma/)) return '#d4af8f';
    if (m.match(/венге|wenge/)) return '#3b2a1c';
    if (m.match(/черный|black|graphite|графит/)) return '#3a3a44';
    if (m.match(/серый|grey|gray|кашемир|cashmere/)) return '#8a8a96';
    if (m.match(/хдф|HDF/)) return '#d8dce6';
    if (m.match(/мдф|MDF|ламинир/)) return '#a89878';
    if (m.match(/алюминий|aluminum|профиль/)) return '#b8bcc8';
    if (m.match(/черновой|rough/)) return '#7a7060';
    return '#8a7f76';
  }

  // DETAIL MESHES (grooves, holes, cutouts, edges)
  function buildPartDetails(p, parentMesh) {
    const details = [];
    const grooves = p.grooves || [];
    const holes = p.holes || [];
    const cutouts = p.cutouts || [];
    const edges = p.edges || [];
    if (!grooves.length && !holes.length && !cutouts.length && !edges.length) return details;
    const pp = parentMesh.position;

    grooves.forEach(g => {
      const gw = (g.w || 20) * sc;
      const gh = (g.h || 20) * sc;
      const gd = (g.d || p.T || 16) * sc;
      const geo = new THREE.BoxGeometry(gw, gh, gd);
      const mat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0 });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(pp.x + (g.x || 0) * sc, pp.y + (g.y || 0) * sc, pp.z + (g.z || 0) * sc);
      m.userData = { partId: p.id, detailType: 'groove' };
      scene.add(m);
      const edges2 = new THREE.EdgesGeometry(geo, 15);
      const line = new THREE.LineSegments(edges2, new THREE.LineBasicMaterial({ color: 0x555555 }));
      line.position.copy(m.position);
      scene.add(line);
      details.push(m, line);
    });

    holes.forEach(h => {
      const hr = ((h.d || h.r || 8) / 2) * sc;
      const hh = ((h.depth || p.T || 16)) * sc;
      const geo = new THREE.CylinderGeometry(hr, hr, hh, 12);
      const mat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(pp.x + (h.x || 0) * sc, pp.y + (h.y || 0) * sc, pp.z + (h.z || 0) * sc);
      if (h.angleX) m.rotation.x = h.angleX * Math.PI / 180;
      if (h.angleZ) m.rotation.z = h.angleZ * Math.PI / 180;
      m.userData = { partId: p.id, detailType: 'hole' };
      scene.add(m);
      details.push(m);
    });

    cutouts.forEach(c => {
      const cw = (c.w || 30) * sc;
      const ch = (c.h || 30) * sc;
      const cd = (c.d || p.T || 16) * sc;
      const geo = new THREE.BoxGeometry(cw, ch, cd);
      const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.95, metalness: 0, transparent: true, opacity: 0.7 });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(pp.x + (c.x || 0) * sc, pp.y + (c.y || 0) * sc, pp.z + (c.z || 0) * sc);
      m.userData = { partId: p.id, detailType: 'cutout' };
      scene.add(m);
      const edges2 = new THREE.EdgesGeometry(geo, 15);
      const line = new THREE.LineSegments(edges2, new THREE.LineBasicMaterial({ color: 0x666666 }));
      line.position.copy(m.position);
      scene.add(line);
      details.push(m, line);
    });

    edges.forEach(e => {
      const side = (e.side || '').toLowerCase();
      const len = (e.length || 0) * sc;
      const thick = 0.002;
      let ew, eh, ed, ex, ey, ez;
      if (side.includes('w') || side.includes('длин')) {
        ew = len; eh = thick; ed = thick;
        ex = pp.x; ey = pp.y; ez = pp.z + (e.offset || 0) * sc;
      } else if (side.includes('h') || side.includes('выс')) {
        ew = thick; eh = len; ed = thick;
        ex = pp.x + (e.offset || 0) * sc; ey = pp.y; ez = pp.z;
      } else {
        ew = thick; eh = thick; ed = len;
        ex = pp.x; ey = pp.y + (e.offset || 0) * sc; ez = pp.z;
      }
      const geo = new THREE.BoxGeometry(ew || 0.01, eh || 0.01, ed || 0.01);
      const mat = new THREE.MeshStandardMaterial({ color: 0x3a7a3a, roughness: 0.6, metalness: 0.1 });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(ex, ey, ez);
      m.userData = { partId: p.id, detailType: 'edge' };
      scene.add(m);
      details.push(m);
    });

    return details;
  }

  // BUILD SCENE
  const detailMeshes = new Map();
  const sc = 0.001;

  function buildScene() {
    meshMap.forEach(m => scene.remove(m));
    edgeLineMap.forEach(l => scene.remove(l));
    detailMeshes.forEach(arr => arr.forEach(m => scene.remove(m)));
    meshMap.clear();
    edgeLineMap.clear();
    detailMeshes.clear();
    originalPositions.clear();
    parts.forEach(p => {
      const geo = new THREE.BoxGeometry(p._size.x, p._size.y, p._size.z);
      const mat = new THREE.MeshStandardMaterial({
        color: getColor(p.material, p),
        roughness: 0.55,
        metalness: 0.1,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(p._pos.x, p._pos.y, p._pos.z);
      mesh.userData = { partId: p.id };
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      const edges = new THREE.EdgesGeometry(geo, 15);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1a1a1a, linewidth: 1 }));
      line.position.copy(mesh.position);
      scene.add(line);
      originalPositions.set(p.id, new THREE.Vector3(p._pos.x, p._pos.y, p._pos.z));
      meshMap.set(p.id, mesh);
      edgeLineMap.set(p.id, line);
      const details = buildPartDetails(p, mesh);
      if (details.length) detailMeshes.set(p.id, details);
    });
    centerCamera();
    updateStats();
    buildModuleMap();
    renderPartsList();
    
  }

  function buildModuleMap() {
    moduleMap.clear();
    parts.forEach(p => {
      const key = getModuleKey(p.code);
      if (!moduleMap.has(key)) moduleMap.set(key, []);
      moduleMap.get(key).push(p);
    });
  }

  function centerCamera() {
    if (!parts.length) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
    parts.forEach(p => {
      if (!p._pos) return;
      minX = Math.min(minX, p._pos.x - p._size.x / 2);
      maxX = Math.max(maxX, p._pos.x + p._size.x / 2);
      minY = Math.min(minY, p._pos.y - p._size.y / 2);
      maxY = Math.max(maxY, p._pos.y + p._size.y / 2);
      minZ = Math.min(minZ, p._pos.z - p._size.z / 2);
      maxZ = Math.max(maxZ, p._pos.z + p._size.z / 2);
    });
    targetPosition.set((minX + maxX) / 2, (minY + maxY) / 2, (minZ + maxZ) / 2);
    const size = Math.max(maxX - minX, maxY - minY, maxZ - minZ);
    camDist = Math.max(size * 1.5, 2);
    updateCamera();
  }

  function selectPart(id) {
    selectedId = id;
    meshMap.forEach(mesh => {
      mesh.material.emissive.setHex(0x000000);
      mesh.material.emissiveIntensity = 0;
    });
    edgeLineMap.forEach(line => { line.material.color.setHex(0x1a1a1a); });
    const selected = meshMap.get(id);
    const selectedLine = edgeLineMap.get(id);
    if (selected) { selected.material.emissive.setHex(0x5b7fff); selected.material.emissiveIntensity = 0.5; }
    if (selectedLine) { selectedLine.material.color.setHex(0x5b7fff); }
    if (xrayActive) applyXray();
    updateSheet(parts.find(p => p.id === id));
    renderPartsList();
    openSheet();
  }

  function renderProcessingInfo(p) {
    const grooves = p.grooves || [];
    const holes = p.holes || [];
    const cutouts = p.cutouts || [];
    const edges = p.edges || [];
    const hasData = grooves.length || holes.length || cutouts.length || edges.length;
    if (!hasData) return '';
    let html = '<div style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px">';
    if (grooves.length) {
      html += `<div style="font-size:9px;color:var(--accent);margin-bottom:2px">Пазы (${grooves.length}):</div>`;
      grooves.forEach((g, i) => {
        html += `<div style="font-size:8px;color:var(--text-secondary);padding-left:6px">${i+1}. x:${g.x||0} y:${g.y||0} ${g.w||0}×${g.h||0}×${g.d||0} мм</div>`;
      });
    }
    if (holes.length) {
      html += `<div style="font-size:9px;color:var(--accent);margin-bottom:2px">Отверстия (${holes.length}):</div>`;
      holes.forEach((h, i) => {
        html += `<div style="font-size:8px;color:var(--text-secondary);padding-left:6px">${i+1}. x:${h.x||0} y:${h.y||0} ⌀${h.d||h.r||'?'} мм</div>`;
      });
    }
    if (cutouts.length) {
      html += `<div style="font-size:9px;color:var(--accent);margin-bottom:2px">Вырезы (${cutouts.length}):</div>`;
      cutouts.forEach((c, i) => {
        html += `<div style="font-size:8px;color:var(--text-secondary);padding-left:6px">${i+1}. x:${c.x||0} y:${c.y||0} ${c.w||0}×${c.h||0} мм</div>`;
      });
    }
    if (edges.length) {
      html += `<div style="font-size:9px;color:var(--accent);margin-bottom:2px">Кромка (${edges.length}):</div>`;
      edges.forEach((e, i) => {
        html += `<div style="font-size:8px;color:var(--text-secondary);padding-left:6px">${i+1}. ${e.side||e.type||'?'} ${e.length||''}${e.length ? ' мм' : ''}</div>`;
      });
    }
    html += '</div>';
    return html;
  }

  function updateSheet(p) {
    const container = document.getElementById('sheetContent');
    if (!p) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:10px;font-size:11px;">👆 Нажмите на деталь</div>';
      return;
    }
    const isScanned = scannedSet.has(p.id);
    const modKey = getModuleKey(p.code);
    const modName = getModuleName(p.code);
    const modColor = getModuleColor(p.code);

    let assemblyHint = '';
    if (modKey !== 'HARDWARE' && modKey !== 'OTHER') {
      const modParts = moduleMap.get(modKey) || [];

  function toggleVisibility(id) {
    const mesh = meshMap.get(id);
    const line = edgeLineMap.get(id);
    if (!mesh) return;
    if (hiddenSet.has(id)) {
      hiddenSet.delete(id);
      mesh.visible = true;
      if (line) line.visible = true;
    } else {
      hiddenSet.add(id);
      mesh.visible = false;
      if (line) line.visible = false;
      if (selectedId === id) { selectedId = null; updateSheet(null); closeSheet(); }
    }
    renderPartsList();
    if (xrayActive) applyXray();
    saveProgress();
    showToast(`${hiddenSet.has(id) ? '🙈' : '👁'} Деталь ${hiddenSet.has(id) ? 'скрыта' : 'показана'}`);
  }

  function showAllParts() {
    hiddenSet.clear();
    meshMap.forEach(mesh => { mesh.visible = true; });
    edgeLineMap.forEach(line => { line.visible = true; });

    if (xrayActive) applyXray();

  function applyXray() {
    meshMap.forEach((mesh, id) => {

        mesh.material.opacity = 0.12;
      } else {

        mesh.material.opacity = 1;

    document.getElementById('xrayBtn').classList.toggle('active', xrayActive);

  // EXPLODE VIEW
  function toggleExplode() {
    explodeActive = !explodeActive;
    document.getElementById('explodeBtn').classList.toggle('active', explodeActive);
    if (!explodeActive) {
      animateExplodeTo(0);
    } else {
      animateExplodeTo(1);
    }
  }

  function animateExplodeTo(target) {
    const startProgress = explodeProgress;
    const startTime = performance.now();
    const duration = 600;

    function step(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      explodeProgress = startProgress + (target - startProgress) * ease;
      applyExplode();
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function applyExplode() {
    if (!originalPositions.size) return;
    const center = new THREE.Vector3();
    let count = 0;
    originalPositions.forEach(pos => { center.add(pos); count++; });
    if (count > 0) center.divideScalar(count);

    parts.forEach(p => {
      const mesh = meshMap.get(p.id);
      const line = edgeLineMap.get(p.id);
      const orig = originalPositions.get(p.id);
      if (!mesh || !orig) return;

      const dir = new THREE.Vector3().subVectors(orig, center);
      const dist = dir.length();
      if (dist > 0.001) dir.normalize();

      const offset = explodeProgress * dist * 0.8;
      const newPos = orig.clone().add(dir.multiplyScalar(offset));
      const delta = new THREE.Vector3().subVectors(newPos, orig);

      mesh.position.copy(newPos);
      if (line) line.position.copy(newPos);

      const details = detailMeshes.get(p.id);
      if (details) {
        details.forEach(d => {
          if (d.isMesh || d.isLineSegments) {
            d.position.add(delta);
          }
        });
      }
    });
  }

  // ASSEMBLY GUIDE
  function toggleAssembly() {
    assemblyMode = !assemblyMode;
    document.getElementById('assembleBtn').classList.toggle('active', assemblyMode);
    document.getElementById('assemblyOverlay').classList.toggle('active', assemblyMode);

    if (assemblyMode) {
      buildAssemblyOrder();
      assemblyIndex = 0;
      updateAssemblyStep();
      autoRotate = false;
    } else {
      stopAssemblyPlay();
    }
  }

  function buildAssemblyOrder() {
    const modKeys = Array.from(moduleMap.keys()).sort();
    assemblyOrder = [];
    modKeys.forEach(key => {
      const modParts = moduleMap.get(key);
      if (modParts) {
        modParts.forEach(p => assemblyOrder.push(p));
      }
    });
    if (assemblyOrder.length === 0) assemblyOrder = [...parts];
  }

  function updateAssemblyStep() {
    if (assemblyOrder.length === 0) return;
    const p = assemblyOrder[assemblyIndex];
    if (!p) return;
    document.getElementById('assemblyStepLabel').textContent = `Шаг ${assemblyIndex + 1}/${assemblyOrder.length}`;
    document.getElementById('assemblyInfo').textContent = `${p.code} — ${p.name || '—'}`;

    meshMap.forEach((mesh, id) => {
      mesh.material.emissive.setHex(0x000000);
      mesh.material.emissiveIntensity = 0;
      mesh.material.transparent = false;
      mesh.material.opacity = 0.15;
    });
    edgeLineMap.forEach(line => { line.material.color.setHex(0x1a1a1a); line.material.transparent = true; line.material.opacity = 0.15; });

    const mesh = meshMap.get(p.id);
    const line = edgeLineMap.get(p.id);
    if (mesh) {
      mesh.material.emissive.setHex(0x5b7fff);
      mesh.material.emissiveIntensity = 0.6;
      mesh.material.transparent = false;
      mesh.material.opacity = 1;
    }
    if (line) {
      line.material.color.setHex(0x5b7fff);
      line.material.transparent = false;
      line.material.opacity = 1;
    }

    startSmoothZoom(p.id);
    updateSheet(p);
    openSheet();
    renderPartsList();
  }

  function stopAssemblyPlay() {
    assemblyPlaying = false;
    if (assemblyTimer) clearInterval(assemblyTimer);
    assemblyTimer = null;
    document.getElementById('asmPlay').textContent = '▶';
  }

  function toggleAssemblyPlay() {
    if (assemblyPlaying) {
      stopAssemblyPlay();
    } else {
      assemblyPlaying = true;
      document.getElementById('asmPlay').textContent = '⏸';
      assemblyTimer = setInterval(() => {
        assemblyIndex = (assemblyIndex + 1) % assemblyOrder.length;
        updateAssemblyStep();
      }, 1500);
    }
  }

      materials[mat].count++;

    });

  // RENDER PARTS LIST WITH MODULE GROUPING
  function renderPartsList() {
    const container = document.getElementById('partsList');
    if (!container) return;
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';

    if (parts.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-secondary);font-size:11px">📁 Загрузите JSON файл для начала</div>';
      return;
    }

    let filtered = parts;
    if (searchTerm) {
      filtered = parts.filter(p =>
        (p.name || '').toLowerCase().includes(searchTerm) ||
        (p.code || '').toLowerCase().includes(searchTerm)
      );
    }

    if (searchTerm) {
      container.innerHTML = '';
      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-secondary);font-size:11px">🔍 Ничего не найдено</div>';
        return;
      }
      filtered.forEach(p => container.appendChild(createPartItem(p)));
      return;
    }

    container.innerHTML = '';
    const sortedKeys = Array.from(moduleMap.keys()).sort((a, b) => {
      if (a === 'HARDWARE') return 1;
      if (b === 'HARDWARE') return -1;
      const pa = a.replace(/_\d+$/, '');
      const pb = b.replace(/_\d+$/, '');
      if (pa !== pb) return pa.localeCompare(pb);
      const na = parseInt(a.match(/\d+$/)?.[0] || '0');
      const nb = parseInt(b.match(/\d+$/)?.[0] || '0');
      return na - nb;
    });

    sortedKeys.forEach(key => {
      const modParts = moduleMap.get(key);
      if (!modParts) return;
      const modName = getModuleName(key === 'HARDWARE' ? 'D-000' : key + '_00');
      const modColor = key === 'HARDWARE' ? '#94a3b8' : getModuleColor(key + '_00');
      const scannedInMod = modParts.filter(p => scannedSet.has(p.id)).length;

      const group = document.createElement('div');
      group.className = 'module-group';
      group.innerHTML = `
        <div class="module-header" data-module="${key}">
          <div class="module-dot" style="background:${modColor}"></div>
          <span class="module-name">${escapeHtml(modName)}</span>
          <span class="module-count">${scannedInMod}/${modParts.length}</span>
          <span class="module-arrow open">▶</span>
        </div>
        <div class="module-parts" data-module-parts="${key}"></div>
      `;

      const header = group.querySelector('.module-header');
      const partsDiv = group.querySelector('.module-parts');
      header.addEventListener('click', () => {
        partsDiv.classList.toggle('collapsed');
        header.querySelector('.module-arrow').classList.toggle('open');
      });

      modParts.forEach(p => partsDiv.appendChild(createPartItem(p)));
      container.appendChild(group);
    });
  }

  function createPartItem(p) {
    const isHidden = hiddenSet.has(p.id);
    const isScanned = scannedSet.has(p.id);
    const div = document.createElement('div');
    div.className = `part-item ${selectedId === p.id ? 'active' : ''}`;
    div.style.opacity = isHidden ? '0.4' : '1';
    const modColor = getModuleColor(p.code);
    div.innerHTML = `
      <div class="part-swatch" style="background:${getColor(p.material, p)};border-left:3px solid ${modColor}"></div>
      <div class="part-info">
        <div class="part-name">${escapeHtml(p.name || '—')}</div>
        <div class="part-code">${escapeHtml(p.code || '—')}</div>
        <div class="part-dims">${p.gab ? p.gab.w + '×' + p.gab.h + '×' + p.gab.d + ' мм' : ''}</div>
      </div>
      <div class="check ${isScanned ? 'done' : ''}">${isScanned ? '✅' : '○'}</div>
    `;
    div.addEventListener('click', () => selectPart(p.id));
    return div;
  }

  // QR SCANNER
  let scanInterval, videoStream;
  function openScanner() {
    document.getElementById('scannerModal').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        videoStream = stream;
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.play();
        startQRScan();
      })
      .catch(() => showToast('❌ Нет доступа к камере'));
  }
  function closeScanner() {
    document.getElementById('scannerModal').classList.add('hidden');
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    if (scanInterval) clearInterval(scanInterval);
  }
  function startQRScan() {
    const video = document.getElementById('video');
    const qrCanvas = document.getElementById('qrCanvas');
    const ctx = qrCanvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      qrCanvas.width = video.videoWidth;
      qrCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code) { handleScan(code.data); closeScanner(); }
    }, 200);
  }
  function handleManualCode() {
    const code = document.getElementById('manualCode').value.trim();
    if (code) { handleScan(code); closeScanner(); }
  }
  function handleScan(code) {
    let found = parts.find(p => p.code === code || p.code?.trim() === code.trim() || p.code?.toLowerCase() === code.toLowerCase());
    if (!found) found = parts.find(p => code.includes(p.code) || p.code?.includes(code));
    if (!found) { showToast('❌ Деталь не найдена'); return; }
    scannedSet.add(found.id);
    updateStats();
    selectPart(found.id);
    startSmoothZoom(found.id);
    showToast(`✅ ${found.name}`);
    saveProgress();
    
    renderPartsList();
  }

  // PROGRESS
  function saveProgress() {
    localStorage.setItem('bazisProgress', JSON.stringify({
      scanned: Array.from(scannedSet),
      hidden: Array.from(hiddenSet),
      projectTitle: document.getElementById('projectTitle').textContent
    }));
  }
  function loadProgress() {
    const data = JSON.parse(localStorage.getItem('bazisProgress') || '{}');
    if (data.scanned) scannedSet = new Set(data.scanned);
    if (data.hidden) hiddenSet = new Set(data.hidden);
  }
  function resetProgress() {
    if (confirm('Сбросить весь прогресс сборки?')) {
      scannedSet.clear();
      hiddenSet.clear();
      meshMap.forEach(m => m.visible = true);
      edgeLineMap.forEach(l => l.visible = true);
      selectedId = null;
      updateSheet(null);
      closeSheet();
      updateStats();
      renderPartsList();
      
      localStorage.removeItem('bazisProgress');
      showToast('🔄 Прогресс сброшен');
    }
  }

  // UI HELPERS
  function openDrawer() { document.getElementById('drawer').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
  function openSheet() { document.getElementById('bottomSheet').classList.add('open'); }
  function closeSheet() { document.getElementById('bottomSheet').classList.remove('open'); }
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  function showToast(msg) {
    let toast = document.getElementById('customToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'customToast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // EVENT BINDING
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        parts = data.parts || data;
        parts.forEach((p, idx) => { if (p.id === undefined) p.id = idx; });
        autoLayout(parts);
        buildScene();
        selectedId = null;
        loadProgress();
        centerCamera();
        closeDrawer();
        updateStats();
        
        showToast(`✅ Загружено ${parts.length} деталей`);
        document.getElementById('projectTitle').textContent = file.name.replace('.json', '');
        saveProgress();
      } catch (err) {
        showToast('❌ Ошибка файла: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  });

  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('closeSheetBtn').addEventListener('click', closeSheet);
  document.getElementById('scanBtn').addEventListener('click', openScanner);
  document.getElementById('rotateBtn').addEventListener('click', () => { autoRotate = !autoRotate; });
  document.getElementById('resetViewBtn').addEventListener('click', () => { centerCamera(); autoRotate = false; isSmoothZoom = false; });
  document.getElementById('focusBtn').addEventListener('click', () => { if (selectedId !== null) startSmoothZoom(selectedId); else showToast('Сначала выберите деталь'); });
  document.getElementById('xrayBtn').addEventListener('click', toggleXray);
  document.getElementById('explodeBtn').addEventListener('click', toggleExplode);
  document.getElementById('assembleBtn').addEventListener('click', toggleAssembly);
  document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
  document.getElementById('printBtn').addEventListener('click', printSpecification);
  document.getElementById('statsBtn').addEventListener('click', showStats);
  document.getElementById('closeScannerBtn').addEventListener('click', closeScanner);
  document.getElementById('manualSubmit').addEventListener('click', handleManualCode);
  document.getElementById('searchInput').addEventListener('input', renderPartsList);

  document.getElementById('asmPrev').addEventListener('click', () => {
    if (assemblyOrder.length === 0) return;
    assemblyIndex = (assemblyIndex - 1 + assemblyOrder.length) % assemblyOrder.length;
    updateAssemblyStep();
  });
  document.getElementById('asmNext').addEventListener('click', () => {
    if (assemblyOrder.length === 0) return;
    assemblyIndex = (assemblyIndex + 1) % assemblyOrder.length;
    updateAssemblyStep();
  });
  document.getElementById('asmPlay').addEventListener('click', toggleAssemblyPlay);
  document.getElementById('asmClose').addEventListener('click', toggleAssembly);

  // ANIMATION
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isDragging && !isSmoothZoom) {
      theta += 0.0025;
      updateCamera();
    }
    if (isSmoothZoom) animateSmoothZoom();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  initTheme();
  initThree();
  updateStats();
</script>
</body>
</html>

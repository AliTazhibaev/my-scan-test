<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Basis Scan — 3D сканер мебели</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0c12;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    /* 3D canvas - полный экран, ничто не перекрывает */
    #canvas3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      touch-action: none;
    }

    /* ========== ВЕРТИКАЛЬНАЯ ПАНЕЛЬ КНОПОК (СЛЕВА, НЕ МЕШАЕТ) ========== */
    .side-buttons {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .side-btn {
      background: rgba(16, 18, 25, 0.85);
      backdrop-filter: blur(12px);
      border: 0.5px solid rgba(0, 212, 255, 0.25);
      width: 50px;
      height: 50px;
      border-radius: 28px;
      font-size: 22px;
      cursor: pointer;
      color: #0cf;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .side-btn:active {
      transform: scale(0.94);
      background: #0cf;
      color: #000;
    }

    .side-btn.active {
      background: rgba(0, 212, 255, 0.25);
      border-color: #0cf;
    }

    /* КНОПКА МЕНЮ (СПРАВА ВВЕРХУ) */
    .menu-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(16, 18, 25, 0.85);
      backdrop-filter: blur(12px);
      border: 0.5px solid rgba(0, 212, 255, 0.25);
      width: 48px;
      height: 48px;
      border-radius: 28px;
      font-size: 22px;
      z-index: 20;
      color: #0cf;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .menu-btn:active {
      transform: scale(0.95);
      background: #0cf;
      color: #000;
    }

    /* ========== НИЖНЯЯ ИНФО-ПАНЕЛЬ (НЕ ПЕРЕКРЫВАЕТ 3D) ========== */
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(12, 14, 20, 0.96);
      backdrop-filter: blur(24px);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 15;
      border-top: 0.5px solid rgba(0, 212, 255, 0.25);
      pointer-events: auto;
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      margin: 10px auto 6px;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 20px 8px 20px;
    }

    .sheet-title {
      font-size: 12px;
      font-weight: 500;
      color: #0cf;
      letter-spacing: 0.5px;
    }

    .sheet-close {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 0 8px;
    }

    .sheet-content {
      padding: 8px 20px 20px 20px;
      max-height: 32vh;
      overflow-y: auto;
    }

    /* Карточка детали — компактная */
    .detail-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .detail-position {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .detail-code {
      font-size: 11px;
      color: #0cf;
      font-family: monospace;
    }

    .detail-name {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 4px;
    }

    .dims {
      display: flex;
      gap: 12px;
      margin: 6px 0;
    }

    .dim {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
    }

    .dim span:first-child { color: #888; }
    .dim span:last-child { color: #0cf; font-weight: 500; }

    .material {
      font-size: 10px;
      color: #ff9f6e;
      background: rgba(255,140,90,0.12);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      width: fit-content;
    }

    .status {
      font-size: 11px;
      margin: 4px 0;
    }
    .status.scanned { color: #2effb0; }
    .status.wait { color: #ffc107; }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .action-btn {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.08);
      padding: 8px 0;
      border-radius: 30px;
      font-size: 12px;
      color: #ddd;
      text-align: center;
      cursor: pointer;
    }

    .action-btn:active {
      background: rgba(0,212,255,0.2);
      color: #0cf;
    }

    /* Шторка списка деталей */
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 340px;
      background: rgba(12, 14, 20, 0.98);
      backdrop-filter: blur(28px);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 30;
      display: flex;
      flex-direction: column;
      border-right: 0.5px solid rgba(0,212,255,0.2);
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      padding: 20px 18px 16px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    .drawer-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #aaa;
      cursor: pointer;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .upload-btn {
      width: 100%;
      background: rgba(0,212,255,0.12);
      border: 0.5px dashed #0cf;
      padding: 14px;
      border-radius: 32px;
      color: #0cf;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .part-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .part-item.active {
      background: rgba(0,212,255,0.15);
      border-left: 3px solid #0cf;
    }

    .part-swatch {
      width: 36px;
      height: 36px;
      border-radius: 12px;
    }

    .part-info { flex: 1; }
    .part-name { font-size: 13px; font-weight: 500; }
    .part-code { font-size: 10px; color: #0cf; margin-top: 2px; }
    .check { font-size: 18px; }
    .check.done { color: #2effb0; }
    .hidden-part { opacity: 0.4; }

    /* Модалка сканера */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .modal.hidden { display: none; }
    .modal-box {
      background: #141722;
      border-radius: 32px;
      padding: 20px;
      width: 90%;
      max-width: 340px;
    }
    #video {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 20px;
      border: 2px solid #0cf;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      background: #1e2432;
      border: none;
      border-radius: 30px;
      color: white;
    }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #000c;
      backdrop-filter: blur(12px);
      padding: 8px 20px;
      border-radius: 40px;
      color: #0cf;
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- КНОПКИ УПРАВЛЕНИЯ (ВЕРТИКАЛЬНО СЛЕВА) -->
<div class="side-buttons">
  <button class="side-btn" id="scanBtn">📷</button>
  <button class="side-btn" id="xrayBtn">🔮</button>
  <button class="side-btn" id="rotateBtn">⟳</button>
  <button class="side-btn" id="resetViewBtn">⌂</button>
</div>

<!-- КНОПКА МЕНЮ (СПРАВА ВВЕРХУ) -->
<div class="menu-btn" id="menuBtn">☰</div>

<!-- НИЖНЯЯ ПАНЕЛЬ ИНФОРМАЦИИ -->
<div id="bottomSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">ДЕТАЛЬ</span>
    <button class="sheet-close" id="closeSheetBtn">✕</button>
  </div>
  <div id="sheetContent" class="sheet-content">
    <div style="text-align:center;color:#666;padding:16px">👆 Нажмите на деталь в 3D</div>
  </div>
</div>

<!-- ШТОРКА СПИСКА ДЕТАЛЕЙ -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span>📋 СПЕЦИФИКАЦИЯ</span>
    <button class="drawer-close" id="closeDrawerBtn">✕</button>
  </div>
  <div class="drawer-content">
    <div class="upload-btn" id="uploadBtn">📂 ЗАГРУЗИТЬ JSON</div>
    <div id="partsList"></div>
  </div>
  <input type="file" id="fileInput" accept=".json" hidden>
</div>

<!-- QR СКАНЕР -->
<div id="scannerModal" class="modal hidden">
  <div class="modal-box">
    <div style="color:#0cf; text-align:center; margin-bottom:12px;">📷 НАВЕДИТЕ НА QR</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="qrCanvas" hidden></canvas>
    <input type="text" id="manualCode" placeholder="Или введите артикул" class="input-field">
    <button id="manualSubmit" style="width:100%;padding:12px;background:#0cf;border:none;border-radius:30px;font-weight:bold;">Проверить</button>
    <button id="closeScannerBtn" style="width:100%;margin-top:8px;padding:12px;background:#2c3e44;border:none;border-radius:30px;color:white;">Закрыть</button>
  </div>
</div>

<script>
  // ========== ПЕРЕМЕННЫЕ ==========
  let parts = [];
  let selectedId = null;
  let scannedSet = new Set();
  let hiddenSet = new Set();
  let meshMap = new Map();
  let xrayActive = false;

  let scene, camera, renderer;
  let theta = 0.8, phi = 0.9, camDist = 3.5;
  let target = new THREE.Vector3(0, 0.5, 0);
  let isDragging = false, prevMouse = { x: 0, y: 0 };
  let autoRotate = false;
  let isSmoothZoom = false;
  let zoomTarget = new THREE.Vector3();

  // ========== THREE.JS ИНИЦИАЛИЗАЦИЯ ==========
  const canvas = document.getElementById('canvas3d');
  
  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c12);
    scene.fog = new THREE.FogExp2(0x0a0c12, 0.02);
    
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(3, 2.5, 3);
    
    // Освещение
    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffffff, 0.9);
    mainLight.position.set(5, 10, 5);
    scene.add(mainLight);
    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.4);
    fillLight.position.set(-3, 2, -4);
    scene.add(fillLight);
    
    const grid = new THREE.GridHelper(6, 20, 0x2a4a6a, 0x1a2a3a);
    grid.position.y = -0.02;
    scene.add(grid);
    
    setupControls();
    animate();
  }
  
  function setupControls() {
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd);
    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('wheel', onWheel);
  }
  
  let touchStartPos = null;
  let isPinching = false;
  let pinchStartDist = 0, pinchStartCamDist = 0;
  
  function onTouchStart(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1) {
      touchStartPos = { x: touches[0].clientX, y: touches[0].clientY };
      isDragging = true;
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      autoRotate = false;
    } else if (touches.length === 2) {
      isPinching = true;
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartCamDist = camDist;
    }
  }
  
  function onTouchMove(e) {
    e.preventDefault();
    const touches = e.touches;
    if (touches.length === 1 && isDragging) {
      theta -= (touches[0].clientX - prevMouse.x) * 0.008;
      phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (touches[0].clientY - prevMouse.y) * 0.008));
      prevMouse = { x: touches[0].clientX, y: touches[0].clientY };
      updateCamera();
    } else if (touches.length === 2 && isPinching) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      camDist = Math.max(0.5, Math.min(12, pinchStartCamDist + (pinchStartDist - dist) * 0.015));
      updateCamera();
    }
  }
  
  function onTouchEnd(e) {
    // Определяем тап (если палец не двигался)
    if (touchStartPos && !isDragging && !isPinching) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.changedTouches[0];
      const deltaX = Math.abs(touch.clientX - touchStartPos.x);
      const deltaY = Math.abs(touch.clientY - touchStartPos.y);
      if (deltaX < 8 && deltaY < 8) {
        handleTap(touch.clientX, touch.clientY, rect);
      }
    }
    isDragging = false;
    isPinching = false;
    touchStartPos = null;
  }
  
  function onMouseDown(e) {
    if (e.button === 0) {
      isDragging = true;
      prevMouse = { x: e.clientX, y: e.clientY };
      autoRotate = false;
    }
  }
  
  function onMouseMove(e) {
    if (!isDragging) return;
    theta -= (e.clientX - prevMouse.x) * 0.005;
    phi = Math.max(0.2, Math.min(Math.PI - 0.2, phi - (e.clientY - prevMouse.y) * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  }
  
  function onMouseUp() { isDragging = false; }
  
  function onWheel(e) {
    camDist = Math.max(0.5, Math.min(12, camDist + camDist * e.deltaY * 0.001));
    updateCamera();
    e.preventDefault();
  }
  
  function updateCamera() {
    if (isSmoothZoom) return;
    camera.position.x = target.x + camDist * Math.sin(phi) * Math.sin(theta);
    camera.position.y = target.y + camDist * Math.cos(phi);
    camera.position.z = target.z + camDist * Math.sin(phi) * Math.cos(theta);
    camera.lookAt(target);
  }
  
  // Плавное приближение
  function startSmoothZoom(partId) {
    const part = parts.find(p => p.id === partId);
    if (!part || !part._pos) return;
    zoomTarget.copy(new THREE.Vector3(part._pos.x, part._pos.y, part._pos.z));
    isSmoothZoom = true;
    autoRotate = false;
  }
  
  function animateSmoothZoom() {
    if (!isSmoothZoom) return;
    camera.position.lerp(zoomTarget, 0.12);
    target.lerp(zoomTarget, 0.12);
    camera.lookAt(target);
    if (camera.position.distanceTo(zoomTarget) < 0.05) {
      isSmoothZoom = false;
      camDist = camera.position.distanceTo(target);
    }
  }
  
  // Рейкастинг для выбора детали
  function handleTap(clientX, clientY, rect) {
    const mouse = new THREE.Vector2();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const visibleMeshes = Array.from(meshMap.values()).filter(m => m.visible === true);
    const hits = raycaster.intersectObjects(visibleMeshes);
    
    if (hits.length > 0) {
      const hitId = hits[0].object.userData.partId;
      if (!hiddenSet.has(hitId)) selectPart(hitId);
    }
  }
  
  // ========== ЗАГРУЗКА JSON И ПОСТРОЕНИЕ ==========
  function autoLayout(partsArr) {
    let minY = Infinity;
    partsArr.forEach(p => { if (p.pos && p.pos.y !== undefined) minY = Math.min(minY, p.pos.y); });
    if (minY === Infinity) minY = 0;
    const sc = 0.001;
    partsArr.forEach(p => {
      if (!p.pos || !p.gab) {
        const cols = Math.ceil(Math.sqrt(partsArr.length));
        const row = Math.floor(p.id / cols);
        const col = p.id % cols;
        p._pos = { x: (col - cols/2) * 0.15, y: 0, z: (row - cols/2) * 0.15 };
        p._size = { x: 0.1, y: 0.1, z: 0.1 };
        return;
      }
      p._pos = { x: (p.pos.x + p.gab.w/2) * sc, y: (p.pos.y - minY + p.gab.h/2) * sc, z: (p.pos.z + p.gab.d/2) * sc };
      p._size = { x: Math.max(p.gab.w,1) * sc, y: Math.max(p.gab.h,1) * sc, z: Math.max(p.gab.d,1) * sc };
    });
  }
  
  function getColor(mat) {
    const m = (mat || '').toLowerCase();
    if (m.includes('белый')) return '#ece7e0';
    if (m.includes('дуб сонома')) return '#c8aa76';
    if (m.includes('дуб')) return '#b89062';
    if (m.includes('венге')) return '#3b2a1c';
    if (m.includes('графит')) return '#4f5154';
    if (m.includes('хром')) return '#bfc7d0';
    if (m.includes('кашемир')) return '#c7bcac';
    return '#9c8e7c';
  }
  
  function buildScene() {
    meshMap.forEach(m => scene.remove(m));
    meshMap.clear();
    parts.forEach(p => {
      const geo = new THREE.BoxGeometry(p._size.x, p._size.y, p._size.z);
      const mat = new THREE.MeshStandardMaterial({
        color: getColor(p.material),
        roughness: 0.55,
        metalness: 0.1,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(p._pos.x, p._pos.y, p._pos.z);
      mesh.userData = { partId: p.id };
      scene.add(mesh);
      meshMap.set(p.id, mesh);
    });
    centerCamera();
    renderPartsList();
  }
  
  function centerCamera() {
    if (!parts.length) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
    parts.forEach(p => {
      if (!p._pos) return;
      minX = Math.min(minX, p._pos.x - p._size.x/2);
      maxX = Math.max(maxX, p._pos.x + p._size.x/2);
      minY = Math.min(minY, p._pos.y - p._size.y/2);
      maxY = Math.max(maxY, p._pos.y + p._size.y/2);
      minZ = Math.min(minZ, p._pos.z - p._size.z/2);
      maxZ = Math.max(maxZ, p._pos.z + p._size.z/2);
    });
    target.set((minX+maxX)/2, (minY+maxY)/2, (minZ+maxZ)/2);
    const size = Math.max(maxX-minX, maxY-minY, maxZ-minZ);
    camDist = Math.max(size * 1.5, 2);
    updateCamera();
  }
  
  // ========== ВЫБОР ДЕТАЛИ И ПОДСВЕТКА ==========
  function selectPart(id) {
    selectedId = id;
    meshMap.forEach(mesh => {
      mesh.material.emissiveIntensity = 0;
      mesh.material.emissive.setHex(0x000000);
    });
    const selected = meshMap.get(id);
    if (selected) {
      selected.material.emissive.setHex(0x00d4ff);
      selected.material.emissiveIntensity = 0.55;
    }
    if (xrayActive) applyXray();
    updateSheet(parts.find(p => p.id === id));
    renderPartsList();
    openSheet();
  }
  
  function updateSheet(p) {
    const container = document.getElementById('sheetContent');
    if (!p) {
      container.innerHTML = '<div style="text-align:center;color:#666;padding:16px">👆 Нажмите на деталь в 3D</div>';
      return;
    }
    const isScanned = scannedSet.has(p.id);
    container.innerHTML = `
      <div class="detail-card">
        <div class="detail-row">
          <span class="detail-position">📌 ${escapeHtml(p.name)}</span>
          <span class="detail-code">${escapeHtml(p.code)}</span>
        </div>
        <div class="dims">
          <div class="dim"><span>Длина</span> <span>${p.L}</span></div>
          <div class="dim"><span>Ширина</span> <span>${p.W}</span></div>
          <div class="dim"><span>Толщина</span> <span>${p.T}</span></div>
        </div>
        <div class="material">${escapeHtml(p.material)}</div>
        <div class="status ${isScanned ? 'scanned' : 'wait'}">${isScanned ? '✅ ОТСКАНИРОВАНО' : '⏳ ОЖИДАЕТ'}</div>
        <div class="action-buttons">
          <div class="action-btn" id="hideBtn">🙈 Скрыть</div>
          <div class="action-btn" id="showAllBtn">👁 Показать всё</div>
          <div class="action-btn" id="zoomBtn">🔍 Приблизить</div>
        </div>
      </div>
    `;
    document.getElementById('hideBtn')?.addEventListener('click', (e) => { e.stopPropagation(); toggleVisibility(p.id); });
    document.getElementById('showAllBtn')?.addEventListener('click', (e) => { e.stopPropagation(); showAllParts(); });
    document.getElementById('zoomBtn')?.addEventListener('click', (e) => { e.stopPropagation(); startSmoothZoom(p.id); });
  }
  
  function toggleVisibility(id) {
    const mesh = meshMap.get(id);
    if (!mesh) return;
    if (hiddenSet.has(id)) {
      hiddenSet.delete(id);
      mesh.visible = true;
    } else {
      hiddenSet.add(id);
      mesh.visible = false;
      if (selectedId === id) {
        selectedId = null;
        updateSheet(null);
        closeSheet();
      }
    }
    renderPartsList();
    if (xrayActive) applyXray();
  }
  
  function showAllParts() {
    hiddenSet.clear();
    meshMap.forEach(mesh => { mesh.visible = true; });
    if (selectedId === null) updateSheet(null);
    renderPartsList();
    if (xrayActive) applyXray();
    showToast('👁 Все детали показаны');
  }
  
  function applyXray() {
    meshMap.forEach((mesh, id) => {
      if (xrayActive && selectedId !== null && id !== selectedId && mesh.visible) {
        mesh.material.transparent = true;
        mesh.material.opacity = 0.2;
      } else {
        mesh.material.transparent = false;
        mesh.material.opacity = 1;
      }
    });
  }
  
  function toggleXray() {
    xrayActive = !xrayActive;
    document.getElementById('xrayBtn').classList.toggle('active', xrayActive);
    if (!xrayActive) {
      meshMap.forEach(m => { m.material.transparent = false; m.material.opacity = 1; });
    } else {
      applyXray();
    }
  }
  
  // ========== UI ==========
  function renderPartsList() {
    const container = document.getElementById('partsList');
    if (!container) return;
    if (parts.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:#666">📁 Загрузите JSON-файл</div>';
      return;
    }
    container.innerHTML = '';
    parts.forEach(p => {
      const isHidden = hiddenSet.has(p.id);
      const div = document.createElement('div');
      div.className = `part-item ${selectedId === p.id ? 'active' : ''}`;
      div.style.opacity = isHidden ? '0.5' : '1';
      div.innerHTML = `
        <div class="part-swatch" style="background:${getColor(p.material)}"></div>
        <div class="part-info">
          <div class="part-name">${escapeHtml(p.name)}</div>
          <div class="part-code">${escapeHtml(p.code)}</div>
        </div>
        <div class="check ${scannedSet.has(p.id) ? 'done' : ''}">${scannedSet.has(p.id) ? '✅' : '○'}</div>
      `;
      div.addEventListener('click', () => selectPart(p.id));
      container.appendChild(div);
    });
  }
  
  function showToast(msg) {
    let toast = document.getElementById('customToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'customToast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }
  
  // ========== QR СКАНЕР ==========
  let scanInterval, videoStream;
  function openScanner() {
    document.getElementById('scannerModal').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(stream => {
        videoStream = stream;
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.play();
        startQRScan();
      }).catch(() => alert('❌ Нет доступа к камере'));
  }
  
  function closeScanner() {
    document.getElementById('scannerModal').classList.add('hidden');
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    if (scanInterval) clearInterval(scanInterval);
  }
  
  function startQRScan() {
    const video = document.getElementById('video');
    const qrCanvas = document.getElementById('qrCanvas');
    const ctx = qrCanvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      qrCanvas.width = video.videoWidth;
      qrCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code) { handleScan(code.data); closeScanner(); }
    }, 200);
  }
  
  function handleManualCode() {
    const code = document.getElementById('manualCode').value.trim();
    if (code) handleScan(code);
    closeScanner();
  }
  
  function handleScan(code) {
    let found = parts.find(p => p.code === code || p.code.trim() === code.trim() || p.code.toLowerCase() === code.toLowerCase());
    if (!found) found = parts.find(p => code.includes(p.code) || p.code.includes(code));
    if (!found) { alert('❌ Деталь не найдена: ' + code); return; }
    scannedSet.add(found.id);
    selectPart(found.id);
    renderPartsList();
    startSmoothZoom(found.id);
    showToast(`✅ ${found.name}`);
  }
  
  // ========== СОБЫТИЯ ИНТЕРФЕЙСА ==========
  function openDrawer() { document.getElementById('drawer').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }
  function openSheet() { document.getElementById('bottomSheet').classList.add('open'); }
  function closeSheet() { document.getElementById('bottomSheet').classList.remove('open'); }
  function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  
  document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        parts = data.parts || data;
        parts.forEach((p, idx) => { if (p.id === undefined) p.id = idx; });
        autoLayout(parts);
        buildScene();
        selectedId = null;
        scannedSet.clear();
        hiddenSet.clear();
        if (xrayActive) toggleXray();
        centerCamera();
        closeDrawer();
        showToast(`✅ Загружено ${parts.length} деталей`);
      } catch(err) { alert('Ошибка файла: ' + err.message); }
    };
    reader.readAsText(file, 'UTF-8');
  });
  
  document.getElementById('menuBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('closeSheetBtn').addEventListener('click', closeSheet);
  document.getElementById('scanBtn').addEventListener('click', openScanner);
  document.getElementById('rotateBtn').addEventListener('click', () => { autoRotate = !autoRotate; });
  document.getElementById('resetViewBtn').addEventListener('click', () => { centerCamera(); autoRotate = false; isSmoothZoom = false; });
  document.getElementById('xrayBtn').addEventListener('click', () => toggleXray());
  document.getElementById('closeScannerBtn').addEventListener('click', closeScanner);
  document.getElementById('manualSubmit').addEventListener('click', handleManualCode);
  
  // Анимация
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate && !isDragging && !isSmoothZoom) { theta += 0.0025; updateCamera(); }
    if (isSmoothZoom) animateSmoothZoom();
    renderer.render(scene, camera);
  }
  
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
  
  initThree();
</script>
</body>
